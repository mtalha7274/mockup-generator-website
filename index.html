<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mockup Editor</title>
<style>
:root {
  --bg-sidebar: #1e1e1e;
  --bg-toolbar: #2a2a2a;
  --bg-panel-row: #252525;
  --bg-workspace: #e8e8e8;
  --bg-input: #333;
  --border: #3a3a3a;
  --border-light: #444;
  --text: #f0f0f0;
  --text-dim: #999;
  --text-muted: #555;
  --accent: #4d9de0;
  --accent-h: #6bb3f5;
  --guide-color: #ff3355;
  --handle-size: 8px;
  --sel-color: #4d9de0;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Arial, sans-serif;
  font-size: 12px;
  background: var(--bg-sidebar);
  color: var(--text);
  display: flex;
  flex-direction: column;
  height: 100vh;
  user-select: none;
}

/* ── TOP TOOLBAR ───────────────────────────────────────── */
#top-bar {
  height: 44px;
  background: var(--bg-toolbar);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 10px;
  gap: 6px;
  flex-shrink: 0;
  z-index: 200;
}
.tb-sep { width: 1px; height: 22px; background: var(--border); margin: 0 2px; flex-shrink: 0; }
.tb-label { font-size: 11px; color: var(--text-dim); white-space: nowrap; }
.tb-btn {
  height: 28px;
  padding: 0 9px;
  background: #3a3a3a;
  border: 1px solid var(--border-light);
  border-radius: 5px;
  color: var(--text-dim);
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 12px;
  white-space: nowrap;
  transition: background 0.1s, color 0.1s;
}
.tb-btn:hover { background: #4a4a4a; color: var(--text); }
.tb-btn:disabled { opacity: 0.35; pointer-events: none; }
.tb-btn svg { width: 13px; height: 13px; flex-shrink: 0; }
.tb-input {
  height: 28px;
  padding: 0 6px;
  background: var(--bg-input);
  border: 1px solid var(--border-light);
  border-radius: 5px;
  color: var(--text);
  font-size: 12px;
  outline: none;
  text-align: center;
}
.tb-input:focus { border-color: var(--accent); }
#zoom-val { width: 54px; }
#mockup-gap { width: 58px; }
.tb-select {
  height: 28px;
  padding: 0 6px;
  background: var(--bg-input);
  border: 1px solid var(--border-light);
  border-radius: 5px;
  color: var(--text);
  font-size: 11px;
  outline: none;
  cursor: pointer;
}
.tb-select option { background: #333; }
.export-menu-wrap {
  position: relative;
  display: inline-flex;
}
.tb-menu {
  position: absolute;
  top: calc(100% + 6px);
  right: 0;
  min-width: 150px;
  padding: 5px;
  border-radius: 7px;
  background: rgba(35,35,35,.98);
  border: 1px solid var(--border-light);
  box-shadow: 0 10px 28px rgba(0,0,0,.28);
  z-index: 40000;
}
.tb-menu.hidden {
  display: none;
}
.tb-menu-item {
  width: 100%;
  height: 30px;
  padding: 0 9px;
  border: 0;
  border-radius: 5px;
  background: transparent;
  color: var(--text);
  cursor: pointer;
  font-size: 12px;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 8px;
}
.tb-menu-item svg {
  width: 14px;
  height: 14px;
  flex: 0 0 auto;
}
.tb-menu-item:hover {
  background: rgba(255,255,255,.09);
}

/* ── MAIN AREA ─────────────────────────────────────────── */
#main {
  display: flex;
  flex: 1;
  min-height: 0;
  overflow: hidden;
}

/* ── THIN LEFT TOOL RAIL ───────────────────────────────── */
#tool-rail {
  width: 46px;
  flex-shrink: 0;
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 8px 4px;
  gap: 4px;
  overflow-y: auto;
  overflow-x: hidden;
}
#tool-grid {
  display: flex;
  flex-direction: column;
  gap: 4px;
  width: 100%;
  align-items: center;
}
.tool-btn {
  background: #282828;
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text-dim);
  cursor: pointer;
  width: 36px;
  height: 36px;
  min-height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 6px;
  transition: background 0.1s, color 0.1s;
}
.tool-btn span { display: none; }
.tool-btn svg { width: 16px; height: 16px; flex-shrink: 0; }
.tool-btn:hover { background: #333; color: var(--text); }
.tool-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

/* ── CANVAS TOP CHROME (above mockup) ─────────────────── */
.cv-chrome {
  position: absolute;
  top: -44.5px;
  left: 0;
  right: 0;
  height: 31px;
  z-index: 10050;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding: 0;
  gap: 8px;
}
.cv-chrome-actions {
  display: flex;
  align-items: center;
  gap: 6px;
}
.cv-chrome-btn {
  width: 28px;
  height: 28px;
  border-radius: 6px;
  border: 1px solid rgba(0,0,0,.12);
  background: rgba(255,255,255,.96);
  box-shadow: 0 2px 8px rgba(0,0,0,.12);
  cursor: pointer;
  color: #333;
  font-size: 14px;
  line-height: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  transition: background 0.1s, transform 0.1s;
}
.cv-chrome-btn:hover { background: #fff; border-color: rgba(0,0,0,.22); color: #000; transform: scale(1.05); }
.cv-chrome-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
.cv-chrome-btn svg { width: 14px; height: 14px; }
.cv-chrome-btn.danger { color: #c92a2a; }
.cv-chrome-btn.danger:hover { color: #a51111; }

/* ── WORKSPACE ─────────────────────────────────────────── */
#workspace {
  flex: 1;
  overflow: auto;
  position: relative;
  background-color: var(--bg-workspace);
  background-image: radial-gradient(circle, #c0c0c0 1px, transparent 1px);
  background-size: 22px 22px;
}
#ws-scaler {
  position: relative;
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 80px;
  width: max-content;
  min-width: 100%;
  /* size set by JS */
}
.canvas-wrap {
  position: relative;
  transform-origin: 0 0;
  flex: 0 0 auto;
  /* size set by JS */
}
.canvas-container {
  position: relative;
  overflow: hidden;
  width: 100%;
  height: 100%;
  /* background set by JS */
  box-shadow: 0 4px 40px rgba(0,0,0,.22), 0 1px 6px rgba(0,0,0,.12);
}

/* ── ELEMENTS ──────────────────────────────────────────── */
.el {
  position: absolute;
  cursor: move;
  transform-origin: center center;
}
.el.locked { cursor: default; }
.el.overflow-ghost {
  pointer-events: none;
}
.el svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: visible; }
.el .text-inner {
  position: absolute;
  inset: 0;
  padding: 4px;
  outline: none;
  word-break: break-word;
  overflow: hidden;
  cursor: inherit;
  user-select: none;
}
.el .text-inner[contenteditable="true"] {
  cursor: text;
  user-select: text;
}
.el img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: block; pointer-events: none; }
.image-clip {
  position: absolute;
  inset: 0;
  overflow: hidden;
  border-radius: inherit;
}

/* selection outline */
.el.is-selected {
  outline: 2px solid var(--sel-color);
  outline-offset: 2px;
}
.el.is-selected::after {
  content: '';
  position: absolute;
  inset: 0;
  border: 1px solid rgba(255,255,255,.85);
  border-radius: 4px;
  pointer-events: none;
  z-index: 9999;
}

/* resize handles */
.rh {
  position: absolute;
  width: var(--ui-handle-size, 10px);
  height: var(--ui-handle-size, 10px);
  background: #fff;
  border: var(--ui-handle-border, 2px) solid var(--sel-color);
  border-radius: 50%;
  z-index: 10000;
  box-shadow: 0 1px 4px rgba(0,0,0,.25);
}
.rh-nw { top: calc(-1 * var(--ui-handle-out, 6px)); left: calc(-1 * var(--ui-handle-out, 6px)); cursor: nw-resize; }
.rh-n  { top: calc(-1 * var(--ui-handle-out, 6px)); left: calc(50% - var(--ui-handle-half, 5px)); cursor: n-resize; }
.rh-ne { top: calc(-1 * var(--ui-handle-out, 6px)); right: calc(-1 * var(--ui-handle-out, 6px)); cursor: ne-resize; }
.rh-e  { top: calc(50% - var(--ui-handle-half, 5px)); right: calc(-1 * var(--ui-handle-out, 6px)); cursor: e-resize; }
.rh-se { bottom: calc(-1 * var(--ui-handle-out, 6px)); right: calc(-1 * var(--ui-handle-out, 6px)); cursor: se-resize; }
.rh-s  { bottom: calc(-1 * var(--ui-handle-out, 6px)); left: calc(50% - var(--ui-handle-half, 5px)); cursor: s-resize; }
.rh-sw { bottom: calc(-1 * var(--ui-handle-out, 6px)); left: calc(-1 * var(--ui-handle-out, 6px)); cursor: sw-resize; }
.rh-w  { top: calc(50% - var(--ui-handle-half, 5px)); left: calc(-1 * var(--ui-handle-out, 6px)); cursor: w-resize; }
.rh-rot {
  position: absolute;
  width: var(--ui-rot-size, 22px);
  height: var(--ui-rot-size, 22px);
  background: var(--sel-color);
  border-radius: 50%;
  cursor: crosshair;
  top: calc(-1 * var(--ui-rot-top, 38px));
  left: calc(50% - var(--ui-rot-half, 11px));
  z-index: 10000;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: var(--ui-rot-font, 13px);
  color: #fff;
  line-height: 1;
  box-shadow: 0 2px 8px rgba(0,0,0,.28);
}
.el-mini-toolbar {
  position: absolute;
  top: calc(-1 * var(--ui-mini-top, 38px));
  left: 50%;
  transform: translateX(-50%) scale(var(--ui-inv-zoom, 1));
  transform-origin: bottom center;
  z-index: 10010;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px;
  border-radius: 5px;
  background: rgba(30,30,30,.94);
  border: 1px solid rgba(255,255,255,.16);
  box-shadow: 0 2px 10px rgba(0,0,0,.28);
}
.el-mini-toolbar button {
  width: 24px;
  height: 24px;
  border: none;
  border-radius: 4px;
  background: transparent;
  color: #fff;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 0;
}
.el-mini-toolbar button:hover { background: rgba(255,255,255,.14); }
.el-mini-toolbar button.danger:hover { background: rgba(201,42,42,.3); color: #ffb3b3; }
.el-mini-toolbar svg { width: 14px; height: 14px; position: static; }
.image-placeholder {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: var(--placeholder-gap, 10px);
  border: var(--placeholder-border, 2px) dashed rgba(77,157,224,.85);
  background: rgba(77,157,224,.08);
  color: #2f6f9f;
  font-size: var(--placeholder-font, 14px);
  font-weight: 600;
  text-align: center;
  pointer-events: none;
}
.image-placeholder svg {
  position: static;
  width: var(--placeholder-icon, 38px);
  height: var(--placeholder-icon, 38px);
  overflow: visible;
}
.image-placeholder span {
  max-width: 82%;
  line-height: 1.2;
  white-space: normal;
  overflow-wrap: anywhere;
}
.frame-shell {
  position: absolute;
  inset: 0;
  background: #070707;
  border: max(4px, 1.2%) solid #070707;
  box-shadow: none;
  overflow: visible;
}
.frame-shell.frame-ios {
  border-radius: 13% / 6%;
}
.frame-shell.frame-android {
  border-radius: 9% / 4.5%;
}
.frame-screen {
  position: absolute;
  overflow: hidden;
  background: #fff;
  box-shadow: inset 0 0 0 1px rgba(0,0,0,.1);
}
.frame-ios .frame-screen {
  left: 2.2%;
  right: 2.2%;
  top: 1.2%;
  bottom: 1.2%;
  border-radius: 11% / 5.1%;
}
.frame-android .frame-screen {
  left: 2.6%;
  right: 2.6%;
  top: 1.7%;
  bottom: 1.7%;
  border-radius: 7% / 3.5%;
}
.frame-screen img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  display: block;
  pointer-events: none;
}
.frame-dynamic-island {
  position: absolute;
  left: 35.1%;
  top: 2.8%;
  width: 29.8%;
  height: 4.1%;
  border-radius: 999px;
  background: #000;
  z-index: 3;
  box-shadow: inset -10px 0 16px rgba(255,255,255,.05);
  pointer-events: none;
}
.frame-dynamic-island::after {
  content: '';
  position: absolute;
  right: 12%;
  top: 24%;
  width: 12%;
  aspect-ratio: 1;
  border-radius: 50%;
  background: radial-gradient(circle at 62% 38%, #202733 0 18%, #07090d 48%, #010101 100%);
}
.frame-punch-hole {
  position: absolute;
  left: 50%;
  top: 3.9%;
  width: 4.5%;
  aspect-ratio: 1;
  transform: translateX(-50%);
  border-radius: 50%;
  background: #050505;
  z-index: 3;
  box-shadow: 0 0 0 1px rgba(255,255,255,.08), inset 0 0 6px rgba(255,255,255,.08);
  pointer-events: none;
}
.frame-side-button {
  position: absolute;
  width: 1.5%;
  min-width: 3px;
  border-radius: 999px;
  background: #070707;
  box-shadow: none;
  pointer-events: none;
}
.frame-side-button.left-one { left: -1.3%; top: 20%; height: 7%; }
.frame-side-button.left-two { left: -1.3%; top: 31%; height: 9%; }
.frame-side-button.left-three { left: -1.3%; top: 42%; height: 9%; }
.frame-side-button.right-one { right: -1.3%; top: 34%; height: 15%; }
.frame-empty .frame-screen {
  background: #f7fbff;
}

/* multi-select box */
#sel-box {
  position: absolute;
  border: 1px dashed var(--sel-color);
  pointer-events: none;
  z-index: 9990;
  display: none;
}
/* rubber band */
#rubber-band {
  position: absolute;
  border: 1px solid var(--sel-color);
  background: rgba(77,157,224,.08);
  pointer-events: none;
  z-index: 9991;
  display: none;
}
/* guide lines */
/* guide lines (stroke width 1.5px; position set in JS centered on axis) */
.guide-v {
  position: absolute;
  top: 0; bottom: 0; width: 1.5px;
  background: var(--guide-color);
  pointer-events: none;
  z-index: 9992;
}
.guide-h {
  position: absolute;
  left: 0; right: 0; height: 1.5px;
  background: var(--guide-color);
  pointer-events: none;
  z-index: 9992;
}

/* ── RIGHT PANEL ───────────────────────────────────────── */
#panel-resizer {
  width: 6px;
  flex-shrink: 0;
  cursor: col-resize;
  background: var(--bg-sidebar);
  border-left: 1px solid var(--border);
  position: relative;
}
#panel-resizer::after {
  content: '';
  position: absolute;
  top: 0;
  bottom: 0;
  left: 2px;
  width: 2px;
  background: transparent;
}
#panel-resizer:hover::after,
body.resizing-panel #panel-resizer::after {
  background: var(--accent);
}
#right-panel {
  width: 256px;
  flex-shrink: 0;
  background: var(--bg-sidebar);
  border-left: 1px solid var(--border);
  overflow-y: auto;
  overflow-x: hidden;
}
.ps { border-bottom: 1px solid var(--border); }
.ps-head {
  padding: 8px 10px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.6px;
  text-transform: uppercase;
  color: var(--text-dim);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.ps-head:hover { color: var(--text); }
.ps-chevron { transition: transform 0.18s; }
.ps-chevron.open { transform: rotate(90deg); }
.ps-body { padding: 2px 10px 10px; }
.ps-body.hidden { display: none; }
.pr { display: flex; align-items: center; gap: 5px; margin-bottom: 7px; }
.pr:last-child { margin-bottom: 0; }
.pl {
  font-size: 11px;
  color: var(--text-dim);
  min-width: 48px;
  flex-shrink: 0;
  line-height: 1.3;
}
.pi {
  flex: 1;
  height: 26px;
  padding: 0 6px;
  background: var(--bg-input);
  border: 1px solid var(--border-light);
  border-radius: 4px;
  color: var(--text);
  font-size: 12px;
  outline: none;
  min-width: 0;
  user-select: text;
}
.pi:focus { border-color: var(--accent); }
.pi-sm { max-width: 56px; }
.pi-xs { max-width: 44px; }
.pi-transform { max-width: 62px; }
.pi-full { max-width: none; }
.p-slider {
  -webkit-appearance: none;
  appearance: none;
  flex: 1;
  height: 4px;
  border-radius: 2px;
  background: #3a3a3a;
  outline: none;
  cursor: pointer;
}
.p-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 12px; height: 12px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
}
.p-btn {
  height: 26px;
  padding: 0 8px;
  background: var(--bg-input);
  border: 1px solid var(--border-light);
  border-radius: 4px;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 11px;
  white-space: nowrap;
  display: inline-flex;
  align-items: center;
  gap: 3px;
}
.p-btn:hover { background: #3a3a3a; color: var(--text); }
.p-btn.on { background: var(--accent); border-color: var(--accent); color: #fff; }
.p-btn-full { flex: 1; justify-content: center; }
.color-row { display: flex; align-items: center; gap: 5px; width: 100%; }
.cswatch {
  position: relative;
  width: 26px;
  height: 26px;
  border-radius: 4px;
  border: 1px solid var(--border-light);
  overflow: hidden;
  flex-shrink: 0;
  cursor: pointer;
}
.cswatch-bg { position: absolute; inset: 0; border-radius: 3px; }
.cswatch input[type=color] {
  position: absolute;
  inset: -6px;
  width: calc(100% + 12px);
  height: calc(100% + 12px);
  opacity: 0;
  cursor: pointer;
  border: none;
}
.p-empty {
  padding: 14px 10px;
  color: var(--text-muted);
  font-size: 11px;
  text-align: center;
  line-height: 1.6;
}
select.pi {
  cursor: pointer;
  height: 26px;
  padding-right: 4px;
}
select.pi option { background: #2a2a2a; }

/* ── EXPORT STATUS ─────────────────────────────────────── */
#export-status {
  position: fixed;
  left: 50%;
  top: 64px;
  transform: translateX(-50%);
  z-index: 30000;
  min-width: 220px;
  max-width: min(360px, calc(100vw - 32px));
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  background: rgba(28,28,28,.96);
  border: 1px solid rgba(255,255,255,.14);
  border-radius: 8px;
  box-shadow: 0 10px 30px rgba(0,0,0,.32);
  color: var(--text);
  pointer-events: none;
}
#export-status.hidden {
  display: none;
}
.export-spinner {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,.25);
  border-top-color: var(--accent);
  animation: export-spin .8s linear infinite;
  flex: 0 0 auto;
}
#export-status-text {
  font-size: 12px;
  font-weight: 600;
  line-height: 1.35;
  overflow-wrap: anywhere;
}
@keyframes export-spin {
  to { transform: rotate(360deg); }
}

/* ── SCROLLBARS ────────────────────────────────────────── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #3a3a3a; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #4a4a4a; }
</style>
</head>
<body>

<!-- ── TOP TOOLBAR ── -->
<div id="top-bar">
  <button class="tb-btn" id="btn-undo" title="Undo (Ctrl+Z)">
    <svg viewBox="0 0 16 16" fill="currentColor"><path d="M5.5 4L2 7.5 5.5 11V8.5H10a2.5 2.5 0 010 5H6V15h4a4 4 0 000-8H5.5V4z"/></svg>Undo
  </button>
  <button class="tb-btn" id="btn-redo" title="Redo (Ctrl+Y)">
    <svg viewBox="0 0 16 16" fill="currentColor"><path d="M10.5 4L14 7.5 10.5 11V8.5H6a2.5 2.5 0 000 5h4V15H6a4 4 0 010-8h4.5V4z"/></svg>Redo
  </button>
  <div class="tb-sep"></div>
  <span class="tb-label">Zoom</span>
  <button class="tb-btn" id="btn-zoom-out" title="Zoom out">−</button>
  <input class="tb-input" id="zoom-val" value="100%" title="Zoom %">
  <button class="tb-btn" id="btn-zoom-in" title="Zoom in">+</button>
  <button class="tb-btn" id="btn-fit" title="Fit to view">Fit</button>
  <div class="tb-sep"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" crossorigin="anonymous"></script>
<script>
'use strict';
// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
const S = {
  canvases: [],
  activeId: null,
  selIds: [],
  clipboard: [],
  tool: 'select',
  zoom: 1,
  mockupGap: 8,
  history: [],
  hIdx: -1,
};

let _elSeq = 0, _cvSeq = 0;
const uid  = () => 'e' + (++_elSeq);
const cvid = () => 'c' + (++_cvSeq);
const IPHONE_16_PRO_SCREEN = { width: 1206, height: 2622 };
const FRAME_COLOR = '#070707';

const activeCV = () => S.canvases.find(c => c.id === S.activeId) || S.canvases[0];
const getEl    = id => { const cv = activeCV(); return cv ? cv.elements.find(e => e.id === id) : null; };
const PROJECT_FILE_VERSION = 1;

// ═══════════════════════════════════════════════════════════
// HISTORY
// ═══════════════════════════════════════════════════════════
function snap() {
  const data = JSON.stringify({ canvases: S.canvases, activeId: S.activeId, mockupGap: S.mockupGap });
  S.history.splice(S.hIdx + 1);
  S.history.push(data);
  if (S.history.length > 100) S.history.shift();
  S.hIdx = S.history.length - 1;
  syncUndoRedo();
}

function undo() {
  if (S.hIdx <= 0) return;
  S.hIdx--;
  restoreSnap();
}
function redo() {
  if (S.hIdx >= S.history.length - 1) return;
  S.hIdx++;
  restoreSnap();
}
function restoreSnap() {
  const d = JSON.parse(S.history[S.hIdx]);
  S.canvases = d.canvases; S.activeId = d.activeId; S.mockupGap = d.mockupGap ?? 8; S.selIds = [];
  renderAll();
}
function syncUndoRedo() {
  document.getElementById('btn-undo').disabled = S.hIdx <= 0;
  document.getElementById('btn-redo').disabled = S.hIdx >= S.history.length - 1;
}

// ═══════════════════════════════════════════════════════════
// CANVAS DATA
// ═══════════════════════════════════════════════════════════
function newCanvas(name, w, h) {
  return { id: cvid(), name: name || 'Canvas', width: w || 1284, height: h || 2778, bgColor: '#ffffff', elements: [] };
}

function newEl(type, x, y, w, h) {
  const zi = nextZ();
  const base = { id: uid(), type, x, y, width: w, height: h, rotation: 0, flipH: false, flipV: false, opacity: 1, locked: false, zIndex: zi };
  const defaults = {
    rect:     { fillColor: '#4d9de0', fillAlpha: 1, borderColor: '#000000', borderWidth: 0, borderRadius: 0 },
    circle:   { fillColor: '#4d9de0', fillAlpha: 1, borderColor: '#000000', borderWidth: 0 },
    triangle: { fillColor: '#4d9de0', fillAlpha: 1, borderColor: '#000000', borderWidth: 0 },
    line:     { strokeColor: '#333333', strokeWidth: 2, lineStyle: 'solid' },
    arrow:    { strokeColor: '#333333', strokeWidth: 2, lineStyle: 'solid', arrowHead: 'end' },
    text:     { text: 'Text', fontFamily: 'Inter, sans-serif', fontSize: 32, fontWeight: 'normal', fontStyle: 'normal', underline: false, textColor: '#000000', textAlign: 'left', autoH: true, fillColor: 'transparent', fillAlpha: 0, borderColor: '#000000', borderWidth: 0, borderRadius: 0 },
    image:    { src: '', fitMode: 'fill', borderColor: '#000000', borderWidth: 0, borderRadius: 0 },
    frame:    { device: 'ios', src: '', fitMode: 'stretch' },
  };
  return Object.assign(base, defaults[type] || {});
}

function nextZ() {
  const cv = activeCV();
  if (!cv || !cv.elements.length) return 1;
  return Math.max(...cv.elements.map(e => e.zIndex)) + 1;
}

function titleFontSizeForCanvas(cv) {
  return Math.round(Math.max(36, Math.min(132, Math.min(cv.width, cv.height) * 0.09)));
}

function directElementDefaults(type, cv) {
  if (type === 'text') {
    const fontSize = titleFontSizeForCanvas(cv);
    const width = Math.round(cv.width * 0.68);
    return {
      width,
      height: Math.round(fontSize * 1.35),
      overrides: {
        text: 'Title',
        fontSize,
        fontWeight: 'bold',
        textAlign: 'center',
      }
    };
  }
  if (type === 'image') {
    return {
      width: Math.round(Math.min(cv.width * 0.54, 720)),
      height: Math.round(Math.min(cv.height * 0.28, 520)),
      overrides: { fitMode: 'fit' }
    };
  }
  if (type === 'frame') {
    const frameAspect = IPHONE_16_PRO_SCREEN.height / IPHONE_16_PRO_SCREEN.width;
    const width = Math.round(Math.min(cv.width * 0.76, 1040 / Math.max(S.zoom, 0.04), cv.height * 0.98 / frameAspect));
    return {
      width,
      height: Math.round(width * frameAspect),
      overrides: { device: 'ios', fitMode: 'stretch' }
    };
  }
  return null;
}

function addElementDirect(type) {
  const cv = activeCV(); if (!cv) return;
  const def = directElementDefaults(type, cv); if (!def) return;
  const x = Math.round((cv.width - def.width) / 2);
  const y = Math.round((cv.height - def.height) / 2);
  const el = Object.assign(newEl(type, x, y, def.width, def.height), def.overrides || {});
  cv.elements.push(el);
  S.selIds = [el.id];
  setTool('select');
  snap();
  renderAll();
}

function addFrameDirect(device) {
  const cv = activeCV(); if (!cv) return;
  const def = directElementDefaults('frame', cv); if (!def) return;
  const width = device === 'android' ? Math.round(def.width * 0.94) : def.width;
  const height = device === 'android' ? Math.round(def.height * 0.97) : def.height;
  const x = Math.round((cv.width - width) / 2);
  const y = Math.round((cv.height - height) / 2);
  const el = Object.assign(newEl('frame', x, y, width, height), def.overrides || {}, { device });
  cv.elements.push(el);
  S.selIds = [el.id];
  setTool('select');
  snap();
  renderAll();
}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
function init() {
  const cv = newCanvas('Canvas 1', 1284, 2778);
  S.canvases.push(cv); S.activeId = cv.id;
  snap();
  renderAll();
  setupWorkspace();
  setupKeyboard();
  setupToolbar();
  setupCanvasChrome();
  setupPanelResize();
  requestAnimationFrame(fitCanvas);
}

// ═══════════════════════════════════════════════════════════
// RENDER ALL
// ═══════════════════════════════════════════════════════════
function renderAll() {
  renderAllCanvases();
  renderPanel();
  syncDimInputs();
  syncGapInput();
}

function renderAllCanvases() {
  const scaler = document.getElementById('ws-scaler');
  scaler.innerHTML = '';
  applyMockupGap();

  S.canvases.forEach(cv => {
    const wrap = createCanvasShell(cv);
    const cvel = wrap.querySelector('.canvas-container');

    wrap.appendChild(createCanvasChrome(cv));
    appendCanvasInteractionLayers(cv, cvel);
    renderElementsForCanvas(cv, cvel);

    scaler.appendChild(wrap);
  });
  renderOverflowMirrors();

  if (S.activeId) {
    const activeEl = document.getElementById('cv-el');
    if (activeEl) {
      renderSelBox();
    }
  }
}

// Canvas rendering is intentionally split into small "component" builders.
// Future AI edits should usually change one helper below instead of touching
// renderAllCanvases(), which only orchestrates the pieces.
function createCanvasShell(cv) {
  const wrap = document.createElement('div');
  wrap.id = `canvas-wrap-${cv.id}`;
  wrap.className = 'canvas-wrap';
  wrap.style.transformOrigin = '0 0';
  // The wrapper reserves the scaled layout size so duplicated canvases sit side-by-side.
  wrap.style.width = (cv.width * S.zoom) + 'px';
  wrap.style.height = (cv.height * S.zoom) + 'px';

  const cvel = document.createElement('div');
  cvel.id = cv.id === S.activeId ? 'cv-el' : `cv-el-${cv.id}`;
  cvel.className = 'canvas-container';
  cvel.style.width = cv.width + 'px';
  cvel.style.height = cv.height + 'px';
  cvel.style.background = cv.bgColor || '#fff';
  cvel.style.transform = `scale(${S.zoom})`;
  cvel.style.transformOrigin = '0 0';
  cvel.dataset.canvasId = cv.id;
  wrap.appendChild(cvel);

  return wrap;
}

function createCanvasChrome(cv) {
  const chrome = document.createElement('div');
  chrome.className = 'cv-chrome';
  chrome.style.top = '-44.5px';
  chrome.style.transformOrigin = 'top right';
  ['pointerdown', 'pointerup', 'click', 'dblclick'].forEach(type => {
    chrome.addEventListener(type, e => e.stopPropagation());
  });

  const actions = document.createElement('div');
  actions.className = 'cv-chrome-actions';
  actions.appendChild(createCanvasDeleteButton(cv));
  actions.appendChild(createCanvasDuplicateButton(cv));
  chrome.appendChild(actions);

  return chrome;
}

function createCanvasDeleteButton(cv) {
  const btn = document.createElement('button');
  btn.type = 'button';
  btn.className = 'cv-chrome-btn danger';
  btn.title = 'Delete canvas';
  btn.disabled = S.canvases.length <= 1;
  btn.innerHTML = '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M3 4h10M6 4V2.5h4V4M5 6v7M8 6v7M11 6v7M4 4l.6 10h6.8L12 4"/></svg>';
  btn.onclick = e => { e.preventDefault(); e.stopPropagation(); deleteCanvasWithConfirm(cv.id); };
  btn.onpointerdown = e => e.stopPropagation();
  return btn;
}

function createCanvasDuplicateButton(cv) {
  const btn = document.createElement('button');
  btn.type = 'button';
  btn.className = 'cv-chrome-btn';
  btn.title = 'Duplicate canvas';
  btn.innerHTML = '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.25"><rect x="5" y="5" width="9" height="9" rx="1"/><path d="M3 11V3h8"/></svg>';
  btn.onclick = e => { e.preventDefault(); e.stopPropagation(); dupCanvas(cv.id); };
  btn.onpointerdown = e => e.stopPropagation();
  return btn;
}

function appendCanvasInteractionLayers(cv, cvel) {
  const rubberBand = document.createElement('div');
  rubberBand.id = cv.id === S.activeId ? 'rubber-band' : `rubber-band-${cv.id}`;
  rubberBand.style.cssText = 'position: absolute; border: 1px solid var(--sel-color); background: rgba(77,157,224,.08); pointer-events: none; z-index: 9991; display: none;';
  cvel.appendChild(rubberBand);

  const selBox = document.createElement('div');
  selBox.id = cv.id === S.activeId ? 'sel-box' : `sel-box-${cv.id}`;
  selBox.style.cssText = 'position: absolute; border: 1px dashed var(--sel-color); pointer-events: none; z-index: 9990; display: none;';
  cvel.appendChild(selBox);
}

function applyCanvasSize() {
  renderAllCanvases();
}

function syncDimInputs() {
  // Canvas dimensions are edited from the properties panel.
}

function syncGapInput() {
  const input = document.getElementById('mockup-gap');
  if (input) input.value = S.mockupGap;
}

function applyMockupGap() {
  const scaler = document.getElementById('ws-scaler');
  if (scaler) scaler.style.gap = Math.max(0, S.mockupGap) + 'px';
}

// ═══════════════════════════════════════════════════════════
// ZOOM
// ═══════════════════════════════════════════════════════════
const WS_PAD = 80;

function applyZoom(z, doScroll) {
  z = Math.max(0.04, Math.min(5, z));
  S.zoom = z;
  document.getElementById('zoom-val').value = Math.round(z * 100) + '%';
  renderAllCanvases();
  if (doScroll) {
    const ws = document.getElementById('workspace');
    const scaler = document.getElementById('ws-scaler');
    ws.scrollLeft = Math.max(0, (scaler.offsetWidth - ws.clientWidth)  / 2);
    ws.scrollTop  = Math.max(0, (scaler.offsetHeight - ws.clientHeight) / 2);
  }
}

function fitCanvas() {
  const ws = document.getElementById('workspace');
  if (S.canvases.length === 0) return;
  const maxW = Math.max(...S.canvases.map(c => c.width));
  const maxH = Math.max(...S.canvases.map(c => c.height));
  const totalCanvasW = S.canvases.reduce((sum, c) => sum + c.width, 0);
  const totalGap = Math.max(0, S.canvases.length - 1) * S.mockupGap;
  const zx = (ws.clientWidth  - WS_PAD * 2 - totalGap) / totalCanvasW;
  const zy = (ws.clientHeight - WS_PAD * 2) / maxH;
  applyZoom(Math.min(zx, zy, 1), true);
}

// ═══════════════════════════════════════════════════════════
// ELEMENT RENDERING
// ═══════════════════════════════════════════════════════════
function renderElements() {
  const cv = activeCV(); if (!cv) return;
  const root = document.getElementById('cv-el');
  if (!root) return;

  // Remove stale element divs
  root.querySelectorAll('.el:not(.overflow-ghost)').forEach(d => {
    if (!cv.elements.find(e => e.id === d.dataset.id)) d.remove();
  });

  // Sort by zIndex, render each
  [...cv.elements].sort((a, b) => a.zIndex - b.zIndex).forEach(el => renderEl(el));
  renderOverflowMirrors();
}

function renderElementsForCanvas(cv, root, canvasIdOverride, opts = {}) {
  // Remove stale element divs
  root.querySelectorAll('.el:not(.overflow-ghost)').forEach(d => {
    if (!cv.elements.find(e => e.id === d.dataset.id)) d.remove();
  });

  // Sort by zIndex, render each
  const canvasId = canvasIdOverride || cv.id;
  [...cv.elements].sort((a, b) => a.zIndex - b.zIndex).forEach(el => renderElInContainer(el, root, canvasId, opts));
}

function renderEl(el) {
  const root = document.getElementById('cv-el');
  if (!root) return;
  renderElInContainer(el, root, S.activeId);
}

function selectElement(id, additive) {
  if (additive) {
    if (!S.selIds.includes(id)) S.selIds = [...S.selIds, id];
  } else {
    S.selIds = [id];
  }
  renderElements(); renderSelBox(); renderPanel();
}

function renderElInContainer(el, root, canvasId, opts = {}) {
  const interactive = opts.interactive !== false;
  const ghost = opts.ghost === true;
  let div = root.querySelector(`.el[data-id="${el.id}"]`);
  const fresh = !div;
  if (fresh) {
    div = document.createElement('div');
    div.classList.add('el');
    div.dataset.id = el.id;
    div.dataset.canvasId = canvasId;
    root.appendChild(div);
    if (interactive) bindElEvents(div);
  }
  div.classList.toggle('overflow-ghost', ghost);
  div.setAttribute('aria-hidden', ghost ? 'true' : 'false');

  // Position / size
  div.style.left    = el.x + 'px';
  div.style.top     = el.y + 'px';
  div.style.width   = el.width  + 'px';
  div.style.height  = el.height + 'px';
  div.style.zIndex  = el.zIndex;
  div.style.opacity = el.opacity;
  div.style.cursor  = el.locked ? 'default' : 'move';
  applyElementUiMetrics(div, el, opts.uiZoom || S.zoom);

  // Transform
  let tf = '';
  if (el.rotation) tf += `rotate(${el.rotation}deg) `;
  if (el.flipH || el.flipV) tf += `scale(${el.flipH ? -1 : 1},${el.flipV ? -1 : 1})`;
  div.style.transform = tf.trim();

  // Type visual
  drawElVisual(div, el);

  // Selection state (only for active canvas)
  const isActive = canvasId === S.activeId;
  const isSelected = isActive && S.selIds.includes(el.id);
  div.classList.toggle('is-selected', isSelected);
  if (isActive && interactive) {
    syncHandles(div, el);
  }
}

function clampUi(value, min, max) {
  return Math.min(Math.max(value, min), max);
}

function applyElementUiMetrics(div, el, uiZoom) {
  const zoom = Math.max(0.04, uiZoom || 1);
  const basisScreen = Math.max(1, Math.min(el.width, el.height) * zoom);
  const handleScreen = clampUi(basisScreen * 0.09, 8, 14);
  const rotScreen = clampUi(basisScreen * 0.16, 18, 24);
  const inv = 1 / zoom;

  const handle = handleScreen * inv;
  const rot = rotScreen * inv;
  div.style.setProperty('--ui-inv-zoom', inv);
  div.style.setProperty('--ui-handle-size', handle + 'px');
  div.style.setProperty('--ui-handle-half', (handle / 2) + 'px');
  div.style.setProperty('--ui-handle-out', (handle * 0.58) + 'px');
  div.style.setProperty('--ui-handle-border', Math.max(1, 2 * inv) + 'px');
  div.style.setProperty('--ui-rot-size', rot + 'px');
  div.style.setProperty('--ui-rot-half', (rot / 2) + 'px');
  div.style.setProperty('--ui-rot-top', (rot + handleScreen * 1.5 * inv) + 'px');
  div.style.setProperty('--ui-rot-font', clampUi(rotScreen * 0.6, 11, 14) * inv + 'px');
  div.style.setProperty('--ui-mini-top', (rot + handleScreen * 2.8 * inv) + 'px');

  const placeholderFont = clampUi(basisScreen * 0.06, 11, 15) * inv;
  const placeholderIcon = clampUi(basisScreen * 0.20, 24, 42) * inv;
  div.style.setProperty('--placeholder-font', placeholderFont + 'px');
  div.style.setProperty('--placeholder-icon', placeholderIcon + 'px');
  div.style.setProperty('--placeholder-gap', clampUi(basisScreen * 0.04, 6, 12) * inv + 'px');
  div.style.setProperty('--placeholder-border', Math.max(1, 2 * inv) + 'px');
}

function renderOverflowMirrors() {
  document.querySelectorAll('.canvas-container .overflow-ghost').forEach(d => d.remove());
  S.canvases.forEach(cv => {
    const root = document.getElementById(cv.id === S.activeId ? 'cv-el' : `cv-el-${cv.id}`);
    if (root) renderOverflowForCanvas(cv, root, `overflow-${cv.id}`);
  });
}

function renderOverflowForCanvas(targetCv, root, canvasId, opts = {}) {
  const targetIndex = S.canvases.findIndex(c => c.id === targetCv.id);
  if (targetIndex < 0) return;

  const prev = S.canvases[targetIndex - 1];
  if (prev) {
    prev.elements
      .filter(el => elementVisualBounds(el).right > prev.width)
      .forEach(el => {
        renderOverflowGhost(el, root, canvasId, el.x - prev.width, el.y, 'from-prev', opts);
      });
  }

  const next = S.canvases[targetIndex + 1];
  if (next) {
    next.elements
      .filter(el => elementVisualBounds(el).left < 0)
      .forEach(el => {
        renderOverflowGhost(el, root, canvasId, targetCv.width + el.x, el.y, 'from-next', opts);
      });
  }
}

function elementVisualBounds(el) {
  const left = el.x;
  const top = el.y;
  const right = el.x + el.width;
  const bottom = el.y + el.height;
  if (!el.rotation) return { left, top, right, bottom };

  const angle = el.rotation * Math.PI / 180;
  const cos = Math.cos(angle);
  const sin = Math.sin(angle);
  const cx = el.x + el.width / 2;
  const cy = el.y + el.height / 2;
  const halfW = el.width / 2;
  const halfH = el.height / 2;
  const corners = [
    [-halfW, -halfH],
    [ halfW, -halfH],
    [ halfW,  halfH],
    [-halfW,  halfH],
  ].map(([x, y]) => ({
    x: cx + x * cos - y * sin,
    y: cy + x * sin + y * cos,
  }));

  return {
    left: Math.min(...corners.map(p => p.x)),
    top: Math.min(...corners.map(p => p.y)),
    right: Math.max(...corners.map(p => p.x)),
    bottom: Math.max(...corners.map(p => p.y)),
  };
}

function renderOverflowGhost(sourceEl, root, canvasId, x, y, direction, opts = {}) {
  const ghost = JSON.parse(JSON.stringify(sourceEl));
  ghost.id = `overflow-${direction}-${sourceEl.id}`;
  ghost.x = x;
  ghost.y = y;
  renderElInContainer(ghost, root, canvasId, { interactive: false, ghost: true, ...opts });
}

function drawElVisual(div, el) {
  switch (el.type) {
    case 'rect':
      div.style.background    = rgba(el.fillColor, el.fillAlpha);
      div.style.border        = el.borderWidth > 0 ? `${el.borderWidth}px solid ${el.borderColor}` : 'none';
      div.style.borderRadius  = (el.borderRadius || 0) + 'px';
      clearSvg(div); clearImg(div);
      break;
    case 'circle':
      div.style.background    = rgba(el.fillColor, el.fillAlpha);
      div.style.border        = el.borderWidth > 0 ? `${el.borderWidth}px solid ${el.borderColor}` : 'none';
      div.style.borderRadius  = '50%';
      clearSvg(div); clearImg(div);
      break;
    case 'triangle': {
      div.style.background = 'transparent';
      div.style.border = 'none';
      div.style.borderRadius = '0';
      clearImg(div);
      let svg = div.querySelector('svg');
      if (!svg) { svg = svgEl(); div.insertBefore(svg, div.firstChild); }
      svg.setAttribute('viewBox', `0 0 ${el.width} ${el.height}`);
      svg.setAttribute('preserveAspectRatio', 'none');
      const fill   = rgba(el.fillColor, el.fillAlpha);
      const stroke = el.borderWidth > 0 ? `stroke="${el.borderColor}" stroke-width="${el.borderWidth}"` : 'stroke="none"';
      svg.innerHTML = `<polygon points="${el.width/2},0 ${el.width},${el.height} 0,${el.height}" fill="${fill}" ${stroke}/>`;
      break;
    }
    case 'line': {
      div.style.background = 'transparent'; div.style.border = 'none';
      clearImg(div);
      let svg = div.querySelector('svg');
      if (!svg) { svg = svgEl(); div.insertBefore(svg, div.firstChild); }
      const h = Math.max(el.height, el.strokeWidth + 2);
      svg.setAttribute('viewBox', `0 0 ${el.width} ${h}`);
      svg.setAttribute('preserveAspectRatio', 'none');
      const dash = dashAttr(el.lineStyle);
      svg.innerHTML = `<line x1="0" y1="${h/2}" x2="${el.width}" y2="${h/2}" stroke="${el.strokeColor}" stroke-width="${el.strokeWidth}" ${dash}/>`;
      break;
    }
    case 'arrow': {
      div.style.background = 'transparent'; div.style.border = 'none';
      clearImg(div);
      let svg = div.querySelector('svg');
      if (!svg) { svg = svgEl(); div.insertBefore(svg, div.firstChild); }
      const h = Math.max(el.height, el.strokeWidth + 12);
      const mId = `am-${el.id}`;
      const msId = `ams-${el.id}`;
      const dash = dashAttr(el.lineStyle);
      const ah = el.arrowHead;
      let defs = '';
      let mStart = '', mEnd = '';
      const c = el.strokeColor;
      if (ah === 'end' || ah === 'both') {
        defs += `<marker id="${mId}" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="${c}"/></marker>`;
        mEnd = `marker-end="url(#${mId})"`;
      }
      if (ah === 'start' || ah === 'both') {
        defs += `<marker id="${msId}" markerWidth="8" markerHeight="6" refX="1" refY="3" orient="auto-start-reverse"><polygon points="0 0,8 3,0 6" fill="${c}"/></marker>`;
        mStart = `marker-start="url(#${msId})"`;
      }
      const x1 = ah === 'start' || ah === 'both' ? el.strokeWidth * 4 : 0;
      const x2 = ah === 'end'   || ah === 'both' ? el.width - el.strokeWidth * 4 : el.width;
      svg.setAttribute('viewBox', `0 0 ${el.width} ${h}`);
      svg.setAttribute('preserveAspectRatio', 'none');
      svg.innerHTML = `<defs>${defs}</defs><line x1="${x1}" y1="${h/2}" x2="${x2}" y2="${h/2}" stroke="${c}" stroke-width="${el.strokeWidth}" ${dash} ${mStart} ${mEnd}/>`;
      break;
    }
    case 'text': {
      div.style.background   = el.fillAlpha > 0 ? rgba(el.fillColor, el.fillAlpha) : 'transparent';
      div.style.border       = el.borderWidth > 0 ? `${el.borderWidth}px solid ${el.borderColor}` : 'none';
      div.style.borderRadius = (el.borderRadius || 0) + 'px';
      clearSvg(div); clearImg(div);
      let inner = div.querySelector('.text-inner');
      if (!inner) {
        inner = document.createElement('div');
        inner.className = 'text-inner';
        inner.contentEditable = 'false';
        inner.addEventListener('input', () => {
          const e2 = getEl(div.dataset.id); if (!e2) return;
          e2.text = inner.innerText;
          if (e2.autoH) { e2.height = inner.scrollHeight + 8; div.style.height = e2.height + 'px'; }
          snap();
        });
        inner.addEventListener('pointerdown', ev => {
          if (inner.contentEditable === 'true') ev.stopPropagation();
        });
        inner.addEventListener('dblclick', ev => {
          ev.preventDefault();
          ev.stopPropagation();
          startTextEditing(inner);
        });
        inner.addEventListener('blur', () => {
          inner.contentEditable = 'false';
          snap();
        });
        inner.addEventListener('keydown', ev => {
          if (ev.key === 'Escape') inner.blur();
        });
        div.appendChild(inner);
      }
      inner.style.fontFamily    = el.fontFamily || 'sans-serif';
      inner.style.fontSize      = el.fontSize + 'px';
      inner.style.fontWeight    = el.fontWeight || 'normal';
      inner.style.fontStyle     = el.fontStyle  || 'normal';
      inner.style.textDecoration = el.underline  ? 'underline' : 'none';
      inner.style.color         = el.textColor  || '#000';
      inner.style.textAlign     = el.textAlign  || 'left';
      if (document.activeElement !== inner) {
        if (inner.innerText !== (el.text || '')) inner.innerText = el.text || '';
      }
      break;
    }
    case 'image': {
      div.style.background   = 'transparent';
      div.style.border       = el.borderWidth > 0 ? `${el.borderWidth}px solid ${el.borderColor}` : 'none';
      div.style.borderRadius = (el.borderRadius || 0) + 'px';
      div.style.overflow     = 'visible';
      clearSvg(div);
      div.querySelectorAll(':scope > img').forEach(i => i.remove());
      let clip = div.querySelector(':scope > .image-clip');
      if (!clip) {
        clip = document.createElement('div');
        clip.className = 'image-clip';
        div.appendChild(clip);
      }
      let img = clip.querySelector('img');
      if (!img) { img = document.createElement('img'); clip.appendChild(img); }
      img.src = el.src || '';
      img.style.display = el.src ? 'block' : 'none';
      img.style.objectFit = el.fitMode === 'fit' ? 'contain' : el.fitMode === 'stretch' ? 'fill' : 'cover';
      let ph = clip.querySelector('.image-placeholder');
      if (!el.src) {
        if (!ph) {
          ph = document.createElement('div');
          ph.className = 'image-placeholder';
          ph.innerHTML = '<svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="5" y="7" width="22" height="18" rx="2"/><circle cx="12" cy="14" r="2.5"/><path d="M6 23l7-7 5 5 3-3 5 5"/></svg><span>Select image</span>';
          clip.appendChild(ph);
        }
      } else if (ph) {
        ph.remove();
      }
      break;
    }
    case 'frame': {
      div.style.background = 'transparent';
      div.style.border = 'none';
      div.style.borderRadius = '0';
      div.style.overflow = 'visible';
      clearSvg(div);
      div.querySelectorAll(':scope > img, :scope > .image-clip').forEach(node => node.remove());
      let shell = div.querySelector(':scope > .frame-shell');
      if (!shell) {
        shell = document.createElement('div');
        div.appendChild(shell);
      }
      shell.className = 'frame-shell frame-' + (el.device === 'android' ? 'android' : 'ios') + (el.src ? '' : ' frame-empty');
      shell.innerHTML = '';

      const screen = document.createElement('div');
      screen.className = 'frame-screen';
      bindFrameDropTarget(screen, el);
      shell.appendChild(screen);

      if (el.src) {
        const img = document.createElement('img');
        img.src = el.src;
        img.style.objectFit = el.fitMode === 'fit' ? 'contain' : el.fitMode === 'stretch' ? 'fill' : 'cover';
        screen.appendChild(img);
      } else {
        const ph = document.createElement('div');
        ph.className = 'image-placeholder';
        ph.innerHTML = '<svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="7" y="3" width="18" height="26" rx="4"/><path d="M13 7h6"/><path d="M10 22l5-5 4 4 2-2 3 3"/></svg><span>Drop screenshot</span>';
        screen.appendChild(ph);
      }

      if (el.device === 'android') {
        const punch = document.createElement('div');
        punch.className = 'frame-punch-hole';
        shell.appendChild(punch);
      } else {
        const island = document.createElement('div');
        island.className = 'frame-dynamic-island';
        shell.appendChild(island);
      }

      ['left-one','left-two','left-three','right-one'].forEach(name => {
        const button = document.createElement('div');
        button.className = 'frame-side-button ' + name;
        shell.appendChild(button);
      });
      break;
    }
  }
}

function svgEl() {
  const s = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  s.style.position = 'absolute'; s.style.top = '0'; s.style.left = '0';
  s.style.pointerEvents = 'none';
  return s;
}
function selectAllText(el) {
  const range = document.createRange();
  range.selectNodeContents(el);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
}
function startTextEditing(inner) {
  inner.contentEditable = 'true';
  inner.focus();
  selectAllText(inner);
}
function clearSvg(div) { div.querySelectorAll(':scope > svg').forEach(s => s.remove()); }
function clearImg(div) {
  div.querySelectorAll('img').forEach(i => i.remove());
  div.querySelectorAll('.image-clip').forEach(c => c.remove());
}
function dashAttr(style) {
  if (style === 'dashed') return 'stroke-dasharray="10,6"';
  if (style === 'dotted') return 'stroke-dasharray="2,5"';
  return '';
}

// ── Selection handles ──
function syncHandles(div, el) {
  div.querySelectorAll('.rh').forEach(h => h.remove());
  div.querySelectorAll('.el-mini-toolbar').forEach(t => t.remove());

      h.className = `rh rh-${pos}`; h.dataset.h = pos;
      div.appendChild(h);
    });
    const r = document.createElement('div');
    r.className = 'rh rh-rot'; r.dataset.h = 'rot'; r.textContent = '↻';
    div.appendChild(r);
  }
}

function createElementMiniToolbar(el) {

function dupCanvas(id) {
  const src = S.canvases.find(c => c.id === id); if (!src) return;
  const copy = JSON.parse(JSON.stringify(src));
  copy.id = cvid(); copy.name = src.name + ' Copy';
  copy.elements = copy.elements.map(e => ({ ...e, id: uid() }));
  const idx = S.canvases.findIndex(c => c.id === id);
  S.canvases.splice(idx + 1, 0, copy);
  S.activeId = copy.id; S.selIds = [];
  closeCvMenu(); snap(); renderAll();
  requestAnimationFrame(() => {
    document.getElementById(`canvas-wrap-${copy.id}`)?.scrollIntoView({ block: 'nearest', inline: 'nearest' });
  });

function delCanvas(id) {
  if (S.canvases.length === 1) return;
  const idx = S.canvases.findIndex(c => c.id === id);
  S.canvases.splice(idx, 1);
  if (S.activeId === id) S.activeId = S.canvases[Math.max(0, idx - 1)].id;
  S.selIds = []; closeCvMenu(); snap(); renderAll();
}

function deleteCanvasWithConfirm(id) {
  const cv = S.canvases.find(c => c.id === id);

function renderPanel() {
  const root = document.getElementById('panel-inner');
  root.innerHTML = '';
  const cv = activeCV(); if (!cv) return;

  if (S.selIds.length === 0) { buildCanvasPanel(root, cv); return; }
  if (S.selIds.length > 1)  { buildMultiPanel(root); return; }
  const el = getEl(S.selIds[0]); if (!el) return;

  buildTransformSection(root, el);
  if (['rect','circle','triangle','text'].includes(el.type)) buildFillSection(root, el);
  if (['rect','circle','triangle','text','image'].includes(el.type)) buildBorderSection(root, el);
  if (['line','arrow'].includes(el.type)) buildStrokeSection(root, el);
  if (el.type === 'text')  buildTextSection(root, el);
  if (el.type === 'image') buildImageSection(root, el);
  if (el.type === 'frame') buildFrameSection(root, el);
  buildLayerSection(root, el);
}

// ── Section builder helpers ──
function makeSection(title) {
  const wrap = document.createElement('div'); wrap.className = 'ps';
  const head = document.createElement('div'); head.className = 'ps-head';
  const chev = document.createElement('span'); chev.className = 'ps-chevron open'; chev.textContent = '›';
  head.appendChild(document.createTextNode(title)); head.appendChild(chev);
  const body = document.createElement('div'); body.className = 'ps-body';
  head.addEventListener('click', () => {
    body.classList.toggle('hidden');
    chev.classList.toggle('open', !body.classList.contains('hidden'));
  });
  wrap.appendChild(head); wrap.appendChild(body);
  return { wrap, body };
}

function row(...children) {
  const r = document.createElement('div'); r.className = 'pr';
  children.forEach(c => r.appendChild(c));
  return r;
}
function lbl(text) {
  const s = document.createElement('span'); s.className = 'pl'; s.textContent = text; return s;
}
function numInput(val, onChange, opts = {}) {
  const i = document.createElement('input');
  i.type = 'number'; i.className = 'pi pi-sm';
  if (opts.min !== undefined) i.min = opts.min;
  if (opts.max !== undefined) i.max = opts.max;
  if (opts.step) i.step = opts.step;
  i.value = Math.round(val * 100) / 100;
  i.addEventListener('input', () => { const v = parseFloat(i.value); if (!isNaN(v)) onChange(v); });
  return i;
}
function slider(val, min, max, onChange) {
  const s = document.createElement('input'); s.type = 'range'; s.className = 'p-slider';
  s.min = min; s.max = max; s.value = val;
  s.addEventListener('input', () => onChange(parseFloat(s.value)));
  return s;
}
function btn(text, onClick, active) {
  const b = document.createElement('button'); b.className = 'p-btn' + (active ? ' on' : '');
  b.textContent = text; b.addEventListener('click', onClick); return b;
}
function colorWidget(hex, alpha, onColor, onAlpha) {
  const wrap = document.createElement('div'); wrap.className = 'color-row';
  // Swatch
  const sw = document.createElement('div'); sw.className = 'cswatch';
  const bg = document.createElement('div'); bg.className = 'cswatch-bg'; bg.style.background = hex || '#000';
  const picker = document.createElement('input'); picker.type = 'color';
  picker.value = toHex6(hex) || '#000000';
  picker.addEventListener('input', () => { bg.style.background = picker.value; hexInp.value = picker.value; onColor(picker.value); });
  sw.appendChild(bg); sw.appendChild(picker); wrap.appendChild(sw);
  // Hex input
  const hexInp = document.createElement('input'); hexInp.type = 'text'; hexInp.className = 'pi'; hexInp.style.flex = '1'; hexInp.style.userSelect = 'text';
  hexInp.value = hex || '#000000';
  hexInp.addEventListener('change', () => {
    let v = hexInp.value.trim();
    if (!v.startsWith('#')) v = '#' + v;
    bg.style.background = v; picker.value = toHex6(v); onColor(v);
  });
  wrap.appendChild(hexInp);
  // Alpha %
  if (onAlpha !== undefined) {
    const ai = document.createElement('input'); ai.type = 'number'; ai.className = 'pi pi-xs'; ai.style.userSelect = 'text';
    ai.min = 0; ai.max = 100; ai.value = Math.round((alpha ?? 1) * 100); ai.title = 'Opacity %';
    ai.addEventListener('input', () => onAlpha(parseFloat(ai.value) / 100));
    wrap.appendChild(ai);
  }
  return wrap;
}

// ── Canvas properties ──
function buildCanvasPanel(root, cv) {
  const { wrap, body } = makeSection('Canvas');
  const nameInp = document.createElement('input');

  const hInp = numInput(cv.height, v => { cv.height = Math.max(1, v || cv.height); applyCanvasSize(); snap(); });

// ── Transform ──
function buildTransformSection(root, el) {
  const { wrap, body } = makeSection('Transform');

  const xInp = numInput(el.x, v => { el.x = v; refreshEl(el); snap(); });
  const yInp = numInput(el.y, v => { el.y = v; refreshEl(el); snap(); });
  xInp.classList.add('pi-transform'); yInp.classList.add('pi-transform');
  xInp.style.flex = '1'; yInp.style.flex = '1';
  body.appendChild(row(lbl('X / Y'), xInp, yInp));

  const wInp = numInput(el.width, v => { el.width  = Math.max(1, v); refreshEl(el); snap(); }, { min: 1 });
  const hInp = numInput(el.height, v => { el.height = Math.max(1, v); refreshEl(el); snap(); }, { min: 1 });
  wInp.classList.add('pi-transform'); hInp.classList.add('pi-transform');
  wInp.style.flex = '1'; hInp.style.flex = '1';
  body.appendChild(row(lbl('W / H'), wInp, hInp));

  // Rotation
  const rotS = slider(el.rotation, 0, 360, v => { el.rotation = v; rotN.value = Math.round(v); refreshEl(el); snap(); });
  rotS.style.flex = '1';
  const rotN = numInput(el.rotation, v => { el.rotation = v; rotS.value = v; refreshEl(el); snap(); }, { min: 0, max: 360 });
  rotN.style.maxWidth = '48px';
  body.appendChild(row(lbl('Rotate'), rotS, rotN));

  // Flip
  const fhBtn = btn('⇔ H', () => { el.flipH = !el.flipH; fhBtn.classList.toggle('on', el.flipH); refreshEl(el); snap(); }, el.flipH);
  const fvBtn = btn('⇕ V', () => { el.flipV = !el.flipV; fvBtn.classList.toggle('on', el.flipV); refreshEl(el); snap(); }, el.flipV);
  fhBtn.style.flex = '1'; fvBtn.style.flex = '1';

// ── Image ──
function fileToDataUrl(file) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = ev => resolve(ev.target.result);
    reader.readAsDataURL(file);
  });
}

function imageSizeFromSrc(src) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => resolve({ width: img.naturalWidth || img.width, height: img.naturalHeight || img.height });
    img.onerror = () => resolve(null);
    img.src = src;
  });
}

function fitImageElementToSource(el, size) {
  if (!size || !size.width || !size.height) return;
  const cv = activeCV();
  const maxW = cv ? cv.width : size.width;
  const maxH = cv ? cv.height : size.height;
  const scale = Math.min(1, maxW / size.width, maxH / size.height);
  const nextW = Math.max(1, Math.round(size.width * scale));
  const nextH = Math.max(1, Math.round(size.height * scale));
  const cx = el.x + el.width / 2;
  const cy = el.y + el.height / 2;

  el.width = nextW;
  el.height = nextH;
  el.x = Math.round(cx - nextW / 2);
  el.y = Math.round(cy - nextH / 2);

  if (cv) {
    el.x = Math.max(0, Math.min(el.x, cv.width - nextW));
    el.y = Math.max(0, Math.min(el.y, cv.height - nextH));
  }
}

async function applyImageFileToElement(el, file) {
  const src = await fileToDataUrl(file);
  el.src = src;
  fitImageElementToSource(el, await imageSizeFromSrc(src));
  refreshEl(el);
  snap();
  renderPanel();
}

function chooseImageForElement(el) {
  const inp = document.createElement('input'); inp.type = 'file'; inp.accept = 'image/*';
  inp.addEventListener('change', () => {
    const f = inp.files[0]; if (!f) return;
    applyImageFileToElement(el, f);
  });
  inp.click();
}

async function applyFrameFileToElement(el, file) {
  if (!file || !file.type.startsWith('image/')) return;
  el.src = await fileToDataUrl(file);
