// Lightweight refresh: re-apply visual + handles without full re-render
function refreshEl(el) {
  const div = document.querySelector(`.el[data-id="${el.id}"]`);
  if (!div) return renderEl(el);
  div.style.left     = el.x + 'px';
  div.style.top      = el.y + 'px';
  div.style.width    = el.width  + 'px';
  div.style.height   = el.height + 'px';
  div.style.zIndex   = el.zIndex;
  div.style.opacity  = el.opacity;
  div.style.cursor   = el.locked ? 'default' : 'move';
  let tf = '';
  if (el.rotation) tf += `rotate(${el.rotation}deg) `;
  if (el.flipH || el.flipV) tf += `scale(${el.flipH?-1:1},${el.flipV?-1:1})`;
  div.style.transform = tf.trim();
  applyElementUiMetrics(div, el, S.zoom);
  drawElVisual(div, el);
  syncHandles(div, el);
  renderOverflowMirrors();
}

// ═══════════════════════════════════════════════════════════
// SELECTION BOX (multi-select outline)
// ═══════════════════════════════════════════════════════════
function renderSelBox() {
  const sb = document.getElementById('sel-box');
  if (S.selIds.length < 2) { sb.style.display = 'none'; return; }
  const cv = activeCV(); if (!cv) return;
  let x1=Infinity,y1=Infinity,x2=-Infinity,y2=-Infinity;
  S.selIds.forEach(id => {
    const e = cv.elements.find(x => x.id === id); if (!e) return;
    x1 = Math.min(x1, e.x); y1 = Math.min(y1, e.y);
    x2 = Math.max(x2, e.x + e.width); y2 = Math.max(y2, e.y + e.height);
  });
  if (x1 === Infinity) { sb.style.display='none'; return; }
  sb.style.display = 'block';
  sb.style.left   = (x1-3)+'px'; sb.style.top    = (y1-3)+'px';
  sb.style.width  = (x2-x1+6)+'px'; sb.style.height = (y2-y1+6)+'px';
}

function clearSelection() {
  S.selIds = [];
  renderAll();
}

// ═══════════════════════════════════════════════════════════
// INTERACTION STATE
// ═══════════════════════════════════════════════════════════
const IX = {
  mode: null, // 'drag' | 'resize' | 'rotate' | 'rubber' | 'insert'
  sx: 0, sy: 0,           // pointer start (client)
  ox: 0, oy: 0,           // original position / rubber-start
  ow: 0, oh: 0,           // original w/h
  orot: 0,                // original rotation
  handle: null,
  elId: null,
  origPositions: [],      // [{id,x,y}] for multi-drag
  insertEl: null,
};

// ═══════════════════════════════════════════════════════════
// WORKSPACE INTERACTIONS
// ═══════════════════════════════════════════════════════════
function setupWorkspace() {
  const ws = document.getElementById('workspace');

  ws.addEventListener('pointerdown', e => {
    const canvasEl = e.target.closest('.canvas-container');
    if (!canvasEl) {
      if (!e.shiftKey && S.selIds.length) clearSelection();
      return;
    }
    
    const canvasId = canvasEl.dataset.canvasId;
    if (canvasId && canvasId !== S.activeId) {
      S.activeId = canvasId;
      clearSelection();
      return;
    }
    
    const rubberBand = canvasEl.querySelector('[id^="rubber-band"]');
    const selBox = canvasEl.querySelector('[id^="sel-box"]');
    if (e.target !== canvasEl && e.target !== rubberBand && e.target !== selBox) return;
    
    if (S.tool !== 'select') {
      beginInsert(e);
    } else {
      if (!e.shiftKey) clearSelection();
      beginRubber(e);
    }
  });

  ws.addEventListener('wheel', e => {
    if (!e.ctrlKey && !e.metaKey) return;
    e.preventDefault();
    applyZoom(S.zoom + (e.deltaY < 0 ? 0.08 : -0.08), false);
  }, { passive: false });

  document.addEventListener('pointermove', onPtrMove);
  document.addEventListener('pointerup',   onPtrUp);
}

function beginInsert(e) {
  const pos = cvCoords(e);
  const type = S.tool;
  const defaults = {
    rect:[120,80], circle:[100,100], triangle:[100,100],
    line:[160,2], arrow:[160,2], text:[200,50], image:[220,160]
  };
  const [dw, dh] = defaults[type] || [100,100];
  // Start at click pos; if user drags we'll expand from pos as origin
  const el = newEl(type, pos.x, pos.y, dw, dh);
  const cv = activeCV();
  cv.elements.push(el);
  S.selIds = [el.id];
  renderEl(el); renderSelBox();

  IX.mode = 'insert'; IX.sx = e.clientX; IX.sy = e.clientY;
  IX.ox = pos.x; IX.oy = pos.y; IX.insertEl = el;
  e.preventDefault();
}

function beginRubber(e) {
  const pos = cvCoords(e);
  IX.mode = 'rubber'; IX.sx = e.clientX; IX.sy = e.clientY;
  IX.ox = pos.x; IX.oy = pos.y;
  const rb = document.getElementById('rubber-band') || document.querySelector('[id^="rubber-band"]');
  if (rb) {
    rb.style.display = 'block';
    rb.style.left = pos.x+'px'; rb.style.top = pos.y+'px';
    rb.style.width = '0'; rb.style.height = '0';
  }
}

function bindElEvents(div) {
  div.addEventListener('dblclick', e => {
    const el = getEl(div.dataset.id);
    if (!el || el.locked) return;
    if (el.type === 'text') {
      const inner = div.querySelector('.text-inner');
      if (!inner) return;
      e.preventDefault();
      e.stopPropagation();
      startTextEditing(inner);
      return;
    }
    if (el.type === 'frame') {
      e.preventDefault();
      e.stopPropagation();
      chooseFrameImageForElement(el);
      return;
    }
    if (el.type !== 'image') return;
    e.preventDefault();
    e.stopPropagation();
    chooseImageForElement(el);
  });

  div.addEventListener('pointerdown', e => {
    if (e.target.classList.contains('rh')) return;
    if (e.target.classList.contains('text-inner') && e.target.contentEditable === 'true') return;
    if (e.target.classList.contains('text-inner') && e.detail > 1) return;
    const id = div.dataset.id;
    const el = getEl(id); if (!el || el.locked) return;
    e.stopPropagation();
    if (!S.selIds.includes(id)) {
      selectElement(id, e.shiftKey);
    }
    // Begin drag — reset any lingering snap/guide state first
    resetSnap();
    IX.mode = 'drag'; IX.elId = id;
    IX.sx = e.clientX; IX.sy = e.clientY;
    const cv = activeCV();
    IX.origPositions = S.selIds.map(sid => {
      const sel = cv.elements.find(x => x.id === sid);
      return sel && !sel.locked ? { id: sid, x: sel.x, y: sel.y } : null;
    }).filter(Boolean);
    e.preventDefault();
    div.setPointerCapture(e.pointerId);
  });

  div.addEventListener('pointerdown', e => {
    if (!e.target.classList.contains('rh')) return;
    e.stopPropagation();
    const id = div.dataset.id; const el = getEl(id); if (!el) return;
    IX.mode = e.target.dataset.h === 'rot' ? 'rotate' : 'resize';
    IX.elId = id; IX.handle = e.target.dataset.h;
    IX.sx = e.clientX; IX.sy = e.clientY;
    IX.ox = el.x; IX.oy = el.y; IX.ow = el.width; IX.oh = el.height; IX.orot = el.rotation;
    e.preventDefault();
    div.setPointerCapture(e.pointerId);
  });
}

function onPtrMove(e) {
  if (!IX.mode) return;
  const cv = activeCV(); if (!cv) return;
  const dx = (e.clientX - IX.sx) / S.zoom;
  const dy = (e.clientY - IX.sy) / S.zoom;

  if (IX.mode === 'drag') {
    IX.origPositions.forEach(orig => {
      const el = cv.elements.find(x => x.id === orig.id); if (!el || el.locked) return;
      const nx = orig.x + dx, ny = orig.y + dy; // raw drag position
      let rx = nx, ry = ny;
      if (S.selIds.length === 1) {
        // applySnap returns lerp-smoothed, magnetically-held render position
        const snapped = applySnap(el, nx, ny);
        rx = snapped.x; ry = snapped.y;
      }
      el.x = rx; el.y = ry; // commit rendered (possibly snapped) position
      const div = document.querySelector(`.el[data-id="${el.id}"]`);
      if (div) { div.style.left = rx+'px'; div.style.top = ry+'px'; }
    });
    renderOverflowMirrors();
    renderSelBox();

  } else if (IX.mode === 'resize') {
    const el = cv.elements.find(x => x.id === IX.elId); if (!el) return;
    applyResize(el, dx, dy, IX.handle, e.shiftKey || el.type === 'frame');
    const div = document.querySelector(`.el[data-id="${el.id}"]`);
    if (div) { div.style.left=el.x+'px'; div.style.top=el.y+'px'; div.style.width=el.width+'px'; div.style.height=el.height+'px'; drawElVisual(div,el); syncHandles(div,el); }
    renderOverflowMirrors();
    renderSelBox();

  } else if (IX.mode === 'rotate') {
    const el = cv.elements.find(x => x.id === IX.elId); if (!el) return;
    const div = document.querySelector(`.el[data-id="${el.id}"]`); if (!div) return;
    const r = div.getBoundingClientRect();
    const cx = r.left + r.width/2, cy = r.top + r.height/2;
    el.rotation = (Math.atan2(e.clientY - cy, e.clientX - cx) * 180 / Math.PI + 90 + 360) % 360;
    div.style.transform = `rotate(${el.rotation}deg)`;
    renderOverflowMirrors();

  } else if (IX.mode === 'rubber') {
    const pos = cvCoords(e);
    const x1=Math.min(pos.x,IX.ox), y1=Math.min(pos.y,IX.oy);
    const rb = document.getElementById('rubber-band') || document.querySelector('[id^="rubber-band"]');
    if (rb) {
      rb.style.left=x1+'px'; rb.style.top=y1+'px';
      rb.style.width=Math.abs(pos.x-IX.ox)+'px'; rb.style.height=Math.abs(pos.y-IX.oy)+'px';
    }

  } else if (IX.mode === 'insert') {
    const pos = cvCoords(e);
    const el = IX.insertEl;
    const x = Math.min(pos.x, IX.ox), y = Math.min(pos.y, IX.oy);
    const w = Math.abs(pos.x - IX.ox), h = Math.abs(pos.y - IX.oy);
    if (w > 6 && h > 6) { el.x = x; el.y = y; el.width = w; el.height = h; }
    const div = document.querySelector(`.el[data-id="${el.id}"]`);
    if (div) { div.style.left=el.x+'px'; div.style.top=el.y+'px'; div.style.width=el.width+'px'; div.style.height=el.height+'px'; drawElVisual(div,el); }
    renderOverflowMirrors();
  }
}

function onPtrUp(e) {
  if (!IX.mode) return;
  if (IX.mode === 'rubber') {
    const rb = document.getElementById('rubber-band') || document.querySelector('[id^="rubber-band"]');
    if (rb) rb.style.display = 'none';
    const pos = cvCoords(e);
    const x1=Math.min(pos.x,IX.ox), y1=Math.min(pos.y,IX.oy);
    const x2=Math.max(pos.x,IX.ox), y2=Math.max(pos.y,IX.oy);
    if (x2-x1 > 4 && y2-y1 > 4) {
      const cv = activeCV();
      S.selIds = cv.elements.filter(el => el.x < x2 && el.x+el.width > x1 && el.y < y2 && el.y+el.height > y1).map(el => el.id);
      renderAll();
    }
  } else if (IX.mode === 'insert') {
    const el = IX.insertEl;
    const wasDrag = Math.abs(e.clientX - IX.sx) > 6 || Math.abs(e.clientY - IX.sy) > 6;
    if (!wasDrag) {
      // Click-place: center at click point
      const defaults = { rect:[120,80], circle:[100,100], triangle:[100,100], line:[160,2], arrow:[160,2], text:[200,50], image:[220,160] };
      const [dw,dh] = defaults[el.type] || [100,100];
      el.x = IX.ox - dw/2; el.y = IX.oy - dh/2; el.width = dw; el.height = dh;
    }
    if (el.type === 'image' && !el.src) {
      const inp = document.createElement('input'); inp.type='file'; inp.accept='image/*';
      inp.addEventListener('change', () => {
        const f=inp.files[0]; if(!f) return;
        applyImageFileToElement(el, f);
      });
      inp.click();
    }
    killGuides();
    setTool('select');
    renderAll(); snap();
  } else if (IX.mode === 'drag') {
    // Schedule guide persistence then fade-out
    if (SS.snappedX) { SS.snappedX = false; SS.snapEdgeFnX = null; scheduleGuideHide('x'); }
    if (SS.snappedY) { SS.snappedY = false; SS.snapEdgeFnY = null; scheduleGuideHide('y'); }
    SS.lerpOffX = 0; SS.lerpOffY = 0; SS.targetOffX = 0; SS.targetOffY = 0;
    snap(); renderPanel(); updateCanvasChrome();
  } else if (IX.mode === 'resize' || IX.mode === 'rotate') {
    snap(); renderPanel(); updateCanvasChrome();
  }
  IX.mode = null; IX.insertEl = null;
}

function applyResize(el, dx, dy, handle, shift) {
  const { ox, oy, ow, oh, orot } = IX;
  const angle = (orot || 0) * Math.PI / 180;
  const cos = Math.cos(angle);
  const sin = Math.sin(angle);
  const localDx = dx * cos + dy * sin;
  const localDy = -dx * sin + dy * cos;
  const aspect = ow / Math.max(oh, 1);
  const minSize = 6;

  let left = -ow / 2;
  let right = ow / 2;
  let top = -oh / 2;
  let bottom = oh / 2;

  if (handle.includes('e')) right += localDx;
  if (handle.includes('w')) left += localDx;
  if (handle.includes('s')) bottom += localDy;
  if (handle.includes('n')) top += localDy;

  if (right - left < minSize) {
    if (handle.includes('w')) left = right - minSize;
    else right = left + minSize;
  }
  if (bottom - top < minSize) {
    if (handle.includes('n')) top = bottom - minSize;
    else bottom = top + minSize;
  }

  if (shift && ow > 0 && oh > 0) {
    const horizontal = handle.includes('e') || handle.includes('w');
    const vertical = handle.includes('n') || handle.includes('s');
    const width = right - left;
    const height = bottom - top;
    const useWidth = horizontal && (!vertical || Math.abs(width - ow) >= Math.abs(height - oh));

    if (useWidth) {
      const nextH = Math.max(minSize, width / aspect);
      if (handle.includes('n')) top = bottom - nextH;
      else if (handle.includes('s')) bottom = top + nextH;
      else { top = -nextH / 2; bottom = nextH / 2; }
    } else {
      const nextW = Math.max(minSize, height * aspect);
      if (handle.includes('w')) left = right - nextW;
      else if (handle.includes('e')) right = left + nextW;
      else { left = -nextW / 2; right = nextW / 2; }
    }
  }

  const nw = right - left;
  const nh = bottom - top;
  const localCenterX = (left + right) / 2;
  const localCenterY = (top + bottom) / 2;
  const centerX = ox + ow / 2 + localCenterX * cos - localCenterY * sin;
  const centerY = oy + oh / 2 + localCenterX * sin + localCenterY * cos;

  el.x = centerX - nw / 2;
  el.y = centerY - nh / 2;
  el.width = nw;
  el.height = nh;
}

// ═══════════════════════════════════════════════════════════
// SNAP STATE & PERSISTENT GUIDE SYSTEM
// ═══════════════════════════════════════════════════════════
const SNAP_DIST    = 6;    // px: engage threshold
const SNAP_RELEASE = 44;   // px: break hold — slightly stronger magnetic band
const LERP_IN      = 0.88; // follow-up frames after first "hit"
const LERP_OUT     = 0.50; // lerp leaving snap
const GUIDE_STROKE = 1.5; // px — matches .guide-v width / .guide-h height
const GUIDE_HOLD   = 300;  // ms: guide persists after snap releases
const GUIDE_FI     = 80;   // ms: guide fade-in
const GUIDE_FO     = 150;  // ms: guide fade-out

// All snap state in one object
const SS = {
  snappedX: false,  snapGuideX: 0,  snapEdgeFnX: null,
  snappedY: false,  snapGuideY: 0,  snapEdgeFnY: null,
  holdTimerX: null, holdTimerY: null,
  lerpOffX: 0,      lerpOffY: 0,
  targetOffX: 0,    targetOffY: 0,
  inBzoneX: false,  inBzoneY: false, // was pointer inside 6px threshold last frame
};

// ── Guide element management ──
function _guideEl(axis) {
  let el = document.getElementById('sg-' + axis);
  if (!el) {
    el = document.createElement('div');
    el.id = 'sg-' + axis;
    el.className = axis === 'x' ? 'guide-v' : 'guide-h';
    el.style.opacity = '0';
    el.style.display = 'none';
    const activeCanvas = document.getElementById('cv-el');
    if (activeCanvas) activeCanvas.appendChild(el);
  }
  return el;
}

function activateGuide(axis, pos) {
  const tk = axis === 'x' ? 'holdTimerX' : 'holdTimerY';
  // Cancel any pending fade-out timer
  if (SS[tk]) { clearTimeout(SS[tk]); SS[tk] = null; }
  const el = _guideEl(axis);
  const half = GUIDE_STROKE / 2;
  if (axis === 'x') el.style.left = (pos - half) + 'px';
  else               el.style.top  = (pos - half) + 'px';
  // Only restart fade-in animation if currently not fully visible
  const curOpacity = parseFloat(el.style.opacity);
  if (el.style.display === 'none' || curOpacity < 0.95) {
    el.style.display = 'block';
    el.style.transition = 'none';
    el.style.opacity = '0';
    void el.offsetWidth; // force reflow to restart transition
    el.style.transition = `opacity ${GUIDE_FI}ms ease-in`;
    el.style.opacity = '1';
  }
}

function scheduleGuideHide(axis) {
  const tk = axis === 'x' ? 'holdTimerX' : 'holdTimerY';
  if (SS[tk]) clearTimeout(SS[tk]);
  SS[tk] = setTimeout(() => {
    SS[tk] = null;
    const el = document.getElementById('sg-' + axis);
    if (!el) return;
    el.style.transition = `opacity ${GUIDE_FO}ms ease-out`;
    el.style.opacity = '0';
    setTimeout(() => { el.style.display = 'none'; }, GUIDE_FO + 10);
  }, GUIDE_HOLD);
}

function killGuides() {
  ['x','y'].forEach(axis => {
    const tk = axis === 'x' ? 'holdTimerX' : 'holdTimerY';
    if (SS[tk]) { clearTimeout(SS[tk]); SS[tk] = null; }
    const el = document.getElementById('sg-' + axis);
    if (el) { el.style.transition = 'none'; el.style.opacity = '0'; el.style.display = 'none'; }
  });
}

// ── Reset snap state (call on drag start) ──
function resetSnap() {
  killGuides();
  SS.snappedX = false; SS.snappedY = false;
  SS.snapEdgeFnX = null; SS.snapEdgeFnY = null;
  SS.lerpOffX = 0; SS.lerpOffY = 0;
  SS.targetOffX = 0; SS.targetOffY = 0;
  SS.inBzoneX = false; SS.inBzoneY = false;
}

// ── Find best snap candidate per axis ──
function findSnaps(el, nx, ny) {
  const cv = activeCV();
  let bX = null, bY = null;
  const ew = el.width, eh = el.height;

  const testX = (pos, edgeFn) => {
    const d = Math.abs(edgeFn(nx) - pos);
    if (d < SNAP_DIST && (!bX || d < bX.d)) bX = { pos, edgeFn, d };
  };
  const testY = (pos, edgeFn) => {
    const d = Math.abs(edgeFn(ny) - pos);
    if (d < SNAP_DIST && (!bY || d < bY.d)) bY = { pos, edgeFn, d };
  };

  // Canvas edges / center
  testX(0,           n => n);        testX(cv.width,    n => n+ew); testX(cv.width/2,  n => n+ew/2);
  testX(0,           n => n+ew);     testX(cv.width,    n => n);
  testY(0,           n => n);        testY(cv.height,   n => n+eh); testY(cv.height/2, n => n+eh/2);
  testY(0,           n => n+eh);     testY(cv.height,   n => n);

  // Other element edges / centers
  cv.elements.filter(e => e.id !== el.id).forEach(o => {
    const oR=o.x+o.width, oB=o.y+o.height, oCX=o.x+o.width/2, oCY=o.y+o.height/2;
    testX(o.x, n=>n); testX(o.x, n=>n+ew); testX(oR, n=>n); testX(oR, n=>n+ew); testX(oCX, n=>n+ew/2);
    testY(o.y, n=>n); testY(o.y, n=>n+eh); testY(oB, n=>n); testY(oB, n=>n+eh); testY(oCY, n=>n+eh/2);
  });

  return { bX, bY };
}

// ── Core: compute snapped+lerped render position ──
// nx, ny = raw drag position; el used for width/height
function applySnap(el, nx, ny) {
  const prevBX = SS.inBzoneX;
  const prevBY = SS.inBzoneY;
  const { bX, bY } = findSnaps(el, nx, ny);

  // X axis
  if (bX) {
    if (!SS.snappedX || SS.snapGuideX !== bX.pos) {
      // Newly engaging snap on X
      SS.snappedX = true;
      SS.snapGuideX = bX.pos;
      SS.snapEdgeFnX = bX.edgeFn;
    }
    activateGuide('x', bX.pos);
    SS.targetOffX = bX.pos - bX.edgeFn(nx);
  } else if (SS.snappedX && SS.snapEdgeFnX) {
    // In hold zone — check if element raw pos has exceeded release margin
    const dist = Math.abs(SS.snapEdgeFnX(nx) - SS.snapGuideX);
    if (dist > SNAP_RELEASE) {
      // Release
      SS.snappedX = false; SS.snapEdgeFnX = null;
      SS.targetOffX = 0;
      scheduleGuideHide('x');
    } else {
      // Still holding: keep element visually locked at guide
      SS.targetOffX = SS.snapGuideX - SS.snapEdgeFnX(nx);
    }
  } else {
    SS.targetOffX = 0;
  }

  // Y axis
  if (bY) {
    if (!SS.snappedY || SS.snapGuideY !== bY.pos) {
      SS.snappedY = true;
      SS.snapGuideY = bY.pos;
      SS.snapEdgeFnY = bY.edgeFn;
    }
    activateGuide('y', bY.pos);
    SS.targetOffY = bY.pos - bY.edgeFn(ny);
  } else if (SS.snappedY && SS.snapEdgeFnY) {
    const dist = Math.abs(SS.snapEdgeFnY(ny) - SS.snapGuideY);
    if (dist > SNAP_RELEASE) {
      SS.snappedY = false; SS.snapEdgeFnY = null;
      SS.targetOffY = 0;
      scheduleGuideHide('y');
    } else {
      SS.targetOffY = SS.snapGuideY - SS.snapEdgeFnY(ny);
    }
  } else {
    SS.targetOffY = 0;
  }

  // ── Lerp — three distinct phases per axis ──
  //
  // ENTRY  (bX):  first frame in threshold → instant snap (hard jerk when line appears);
  //                then fast lerp for tiny correction while still in zone
  // HOLD   (snappedX,!bX): hard-lock at guide
  // EXIT   (!snappedX):    lerp toward free drag

  if (bX) {
    if (!prevBX) {
      SS.lerpOffX = SS.targetOffX; // strong jerk the moment guides engage
    } else {
      SS.lerpOffX += (SS.targetOffX - SS.lerpOffX) * LERP_IN;
      if (Math.abs(SS.lerpOffX - SS.targetOffX) < 0.1) SS.lerpOffX = SS.targetOffX;
    }
  } else if (SS.snappedX) {
    SS.lerpOffX = SS.targetOffX;
  } else {
    SS.lerpOffX += (0 - SS.lerpOffX) * LERP_OUT;
    if (Math.abs(SS.lerpOffX) < 0.1) SS.lerpOffX = 0;
  }

  if (bY) {
    if (!prevBY) {
      SS.lerpOffY = SS.targetOffY;
    } else {
      SS.lerpOffY += (SS.targetOffY - SS.lerpOffY) * LERP_IN;
      if (Math.abs(SS.lerpOffY - SS.targetOffY) < 0.1) SS.lerpOffY = SS.targetOffY;
    }
  } else if (SS.snappedY) {
    SS.lerpOffY = SS.targetOffY;
  } else {
    SS.lerpOffY += (0 - SS.lerpOffY) * LERP_OUT;
    if (Math.abs(SS.lerpOffY) < 0.1) SS.lerpOffY = 0;
  }

  SS.inBzoneX = !!bX;
  SS.inBzoneY = !!bY;

  return { x: nx + SS.lerpOffX, y: ny + SS.lerpOffY };
}

// ═══════════════════════════════════════════════════════════
// CANVAS COORD HELPER
// ═══════════════════════════════════════════════════════════
function cvCoords(e) {
  const activeEl = document.getElementById('cv-el') || document.querySelector('.canvas-container');
  if (!activeEl) return { x: 0, y: 0 };
  const r = activeEl.getBoundingClientRect();
  return { x: (e.clientX - r.left) / S.zoom, y: (e.clientY - r.top) / S.zoom };
}

// ═══════════════════════════════════════════════════════════
// TOOLBAR
// ═══════════════════════════════════════════════════════════
function setupToolbar() {
  document.getElementById('btn-undo').addEventListener('click', undo);
  document.getElementById('btn-redo').addEventListener('click', redo);
  document.getElementById('btn-zoom-in').addEventListener('click',  () => applyZoom(S.zoom + 0.1));
  document.getElementById('btn-zoom-out').addEventListener('click', () => applyZoom(S.zoom - 0.1));
  document.getElementById('btn-fit').addEventListener('click', fitCanvas);
  document.getElementById('btn-export').addEventListener('click', toggleExportMenu);
  document.getElementById('export-project-option').addEventListener('click', () => runExportMenuAction(exportProject));
  document.getElementById('export-mockups-option').addEventListener('click', () => runExportMenuAction(exportPNG));
  const projectImportInput = document.getElementById('project-import-input');
  document.getElementById('btn-project-import').addEventListener('click', () => projectImportInput.click());
  projectImportInput.addEventListener('change', async () => {
    const file = projectImportInput.files && projectImportInput.files[0];
    projectImportInput.value = '';
    if (file) await importProjectFile(file);
  });

  const zv = document.getElementById('zoom-val');
  zv.addEventListener('change', () => { const v = parseFloat(zv.value); if (!isNaN(v)) applyZoom(v/100); });

  const gapInp = document.getElementById('mockup-gap');
  gapInp.addEventListener('change', () => {
    const v = parseFloat(gapInp.value);
    if (isNaN(v)) { syncGapInput(); return; }
    S.mockupGap = Math.max(0, Math.min(600, v));
    applyMockupGap();
    syncGapInput();
    snap();
  });

  document.getElementById('btn-frame-ios').addEventListener('click', () => addFrameDirect('ios'));
  document.getElementById('btn-frame-android').addEventListener('click', () => addFrameDirect('android'));

  document.getElementById('btn-add-canvas').addEventListener('click', addNewCanvas);

  document.querySelectorAll('#tool-rail .tool-btn').forEach(btn => {
    if (!btn.dataset.tool) return;
    btn.addEventListener('click', () => {
      const tool = btn.dataset.tool;
      if (tool === 'text' || tool === 'image') addElementDirect(tool);
      else setTool(tool);
    });
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('.export-menu-wrap')) hideExportMenu();
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') hideExportMenu();
  });
}

function toggleExportMenu(e) {
  if (e) e.stopPropagation();
  const menu = document.getElementById('export-menu');
  const btn = document.getElementById('btn-export');
  if (!menu || !btn) return;
  const isOpen = menu.classList.toggle('hidden') === false;
  btn.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
}

function hideExportMenu() {
  const menu = document.getElementById('export-menu');
  const btn = document.getElementById('btn-export');
  if (menu) menu.classList.add('hidden');
  if (btn) btn.setAttribute('aria-expanded', 'false');
}

function runExportMenuAction(action) {
  hideExportMenu();
  action();
}

function setupPanelResize() {
  const resizer = document.getElementById('panel-resizer');
  const panel = document.getElementById('right-panel');
  if (!resizer || !panel) return;

  let startX = 0;
  let startW = 0;
  const minW = 240;
  const maxW = 620;

  const onMove = e => {
    const next = Math.min(maxW, Math.max(minW, startW - (e.clientX - startX)));
    panel.style.width = next + 'px';
  };
  const onUp = () => {
    document.body.classList.remove('resizing-panel');
    document.removeEventListener('pointermove', onMove);
    document.removeEventListener('pointerup', onUp);
  };

  resizer.addEventListener('pointerdown', e => {
    startX = e.clientX;
    startW = panel.getBoundingClientRect().width;
    document.body.classList.add('resizing-panel');
    document.addEventListener('pointermove', onMove);
    document.addEventListener('pointerup', onUp);
    e.preventDefault();
  });
}

function setTool(tool) {
  S.tool = tool;
  document.querySelectorAll('#tool-rail .tool-btn').forEach(b => b.classList.toggle('active', b.dataset.tool === tool));
  document.getElementById('workspace').style.cursor = tool === 'select' ? 'default' : 'crosshair';
}

// ═══════════════════════════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════════════════════════
function setupKeyboard() {
  document.addEventListener('keydown', e => {
    const ae = document.activeElement;
    if (ae && (ae.tagName === 'INPUT' || ae.tagName === 'TEXTAREA' || ae.contentEditable === 'true' || ae.tagName === 'SELECT')) {
      if (e.key === 'Escape') ae.blur();
      return;
    }
    const cv = activeCV();
    const ctrl = e.ctrlKey || e.metaKey;

    if (e.key === 'Delete' || e.key === 'Backspace') {
      e.preventDefault(); deleteSelected();
    } else if (e.key === 'Escape') {
      closeCvMenu();
      S.selIds = []; setTool('select'); renderElements(); renderSelBox(); renderPanel();
    } else if (ctrl && e.key.toLowerCase() === 'z') {
      e.preventDefault(); e.shiftKey ? redo() : undo();
    } else if (ctrl && e.key.toLowerCase() === 'y') {
      e.preventDefault(); redo();
    } else if (ctrl && e.key.toLowerCase() === 'a') {
      e.preventDefault();
      S.selIds = cv.elements.map(el => el.id);
      renderElements(); renderSelBox(); renderPanel();
    } else if (ctrl && e.key.toLowerCase() === 'd') {
      e.preventDefault(); duplicateSelected();
    } else if (ctrl && e.key.toLowerCase() === 'c') {
      e.preventDefault(); copySelected();
    } else if (ctrl && e.key.toLowerCase() === 'v') {
      e.preventDefault(); pasteSelected();
    } else if (ctrl && e.key.toLowerCase() === 'g') {
      e.preventDefault(); e.shiftKey ? ungroupSelected() : groupSelected();
    } else {
      // Arrow nudge
      const nudge = e.shiftKey ? 10 : 1;
      let dx=0,dy=0;
      if (e.key==='ArrowLeft') {dx=-nudge;} else if (e.key==='ArrowRight') {dx=nudge;}
      else if (e.key==='ArrowUp') {dy=-nudge;} else if (e.key==='ArrowDown') {dy=nudge;}
      if (dx||dy) {
        e.preventDefault();
        S.selIds.forEach(id => { const el=cv.elements.find(x=>x.id===id); if(el&&!el.locked){el.x+=dx;el.y+=dy;} });
        renderElements(); renderSelBox(); renderPanel(); snap();
      }
      // Tool shortcuts (no modifier)
      if (!ctrl) {
        if (e.key==='v'||e.key==='V') setTool('select');
        if (e.key==='r'||e.key==='R') setTool('rect');
        if (e.key==='e'||e.key==='E') setTool('circle');
        if (e.key==='l'||e.key==='L') setTool('line');
        if (e.key==='t'||e.key==='T') setTool('text');
      }
    }
  });
}

// ═══════════════════════════════════════════════════════════
// ELEMENT OPERATIONS
// ═══════════════════════════════════════════════════════════
function deleteSelected() {
  if (!S.selIds.length) return;
  const cv = activeCV();
  cv.elements = cv.elements.filter(e => !S.selIds.includes(e.id));
  S.selIds = []; snap(); renderAll();
}

function deleteElementById(id) {
  const cv = activeCV(); if (!cv) return;
  cv.elements = cv.elements.filter(e => e.id !== id);
  S.selIds = S.selIds.filter(selId => selId !== id);
  snap(); renderAll();
}

function duplicateSelected() {
  if (!S.selIds.length) return;
  const cv = activeCV(); const newIds = [];
  S.selIds.forEach(id => {
    const el = cv.elements.find(x=>x.id===id); if(!el) return;
    const copy = JSON.parse(JSON.stringify(el));
    copy.id = uid(); copy.x+=20; copy.y+=20; copy.zIndex = nextZ();
    cv.elements.push(copy); newIds.push(copy.id);
  });
  S.selIds = newIds; snap(); renderAll();
}

function duplicateElementById(id) {
  const cv = activeCV(); if (!cv) return;
  const el = cv.elements.find(x => x.id === id); if (!el) return;
  const copy = JSON.parse(JSON.stringify(el));
  copy.id = uid(); copy.x += 20; copy.y += 20; copy.zIndex = nextZ();
  cv.elements.push(copy);
  S.selIds = [copy.id];
  snap(); renderAll();
}

function copySelected() {
  const cv = activeCV();
  S.clipboard = S.selIds.map(id => cv.elements.find(e=>e.id===id)).filter(Boolean).map(e=>JSON.parse(JSON.stringify(e)));
}

function pasteSelected() {
  if (!S.clipboard.length) return;
  const cv = activeCV(); const newIds = [];
  S.clipboard.forEach(orig => {
    const copy = JSON.parse(JSON.stringify(orig));
    copy.id=uid(); copy.x+=20; copy.y+=20; copy.zIndex=nextZ();
    cv.elements.push(copy); newIds.push(copy.id);
  });
  S.selIds = newIds; snap(); renderAll();
}

function groupSelected() {
  if (S.selIds.length < 2) return;
  const cv = activeCV();
  let x1=Infinity,y1=Infinity,x2=-Infinity,y2=-Infinity;
  S.selIds.forEach(id => {
    const el = cv.elements.find(x=>x.id===id); if(!el) return;
    x1=Math.min(x1,el.x); y1=Math.min(y1,el.y);
    x2=Math.max(x2,el.x+el.width); y2=Math.max(y2,el.y+el.height);
  });
  const group = newEl('rect', x1, y1, x2-x1, y2-y1);
  group.isGroup = true; group.children = [...S.selIds];
  group.fillColor = 'transparent'; group.fillAlpha = 0;
  group.borderColor = '#4d9de0'; group.borderWidth = 1;
  cv.elements = cv.elements.filter(e => !S.selIds.includes(e.id));
  cv.elements.push(group);
  S.selIds = [group.id]; snap(); renderAll();
}

function ungroupSelected() {
  const cv = activeCV();
  S.selIds.forEach(id => {
    const el = cv.elements.find(x=>x.id===id);
    if (!el || !el.isGroup || !el.children) return;
    // Just remove group wrapper; child data is gone (simple impl)
    cv.elements = cv.elements.filter(x=>x.id!==id);
  });
  S.selIds = []; snap(); renderAll();
}

// ═══════════════════════════════════════════════════════════
// PROJECT FILES
// ═══════════════════════════════════════════════════════════
function exportProject() {
  const blob = new Blob([JSON.stringify(buildProjectPayload(), null, 2)], { type: 'application/json' });
  downloadBlob(blob, projectFileName());
}

function buildProjectPayload() {
  return {
    app: 'mockup-generator',
    version: PROJECT_FILE_VERSION,
    exportedAt: new Date().toISOString(),
    state: {
      canvases: S.canvases,
      activeId: S.activeId,
      mockupGap: S.mockupGap,
      zoom: S.zoom,
      selIds: S.selIds,
      workspaceScroll: workspaceScrollState()
    }
  };
}

function projectFileName() {
  const cv = activeCV();
  const base = (cv?.name || 'mockup-project').trim().replace(/[\\/:*?"<>|]+/g, '-').replace(/\s+/g, '-') || 'mockup-project';
  return base + '.mockup';
}

function workspaceScrollState() {
  const ws = document.getElementById('workspace');
  return ws ? { left: ws.scrollLeft, top: ws.scrollTop } : { left: 0, top: 0 };
}

async function importProjectFile(file) {
  try {
    const payload = JSON.parse(await readProjectFile(file));
    const state = normalizeProjectState(payload);
    S.canvases = state.canvases;
    S.activeId = state.activeId;
    S.mockupGap = state.mockupGap;
    S.zoom = state.zoom;
    S.selIds = state.selIds;
    S.clipboard = [];
    S.tool = 'select';
    S.history = [];
    S.hIdx = -1;
    rebuildIdSequences();
    snap(); renderAll(); syncZoomInput();
    requestAnimationFrame(() => restoreWorkspaceScroll(state.workspaceScroll));
  } catch (error) {
    console.error(error);
    window.alert('Could not import this project file.');
  }
}

function readProjectFile(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(String(reader.result || ''));
    reader.onerror = () => reject(reader.error || new Error('Could not read project file'));
    reader.readAsText(file);
  });
}

function normalizeProjectState(payload) {
  const state = payload && payload.state ? payload.state : payload;
  if (!state || !Array.isArray(state.canvases) || !state.canvases.length) {
    throw new Error('Invalid project file');
  }

  const canvases = state.canvases.map(cv => ({
    ...cv,
    width: Math.max(1, Number(cv.width) || 1284),
    height: Math.max(1, Number(cv.height) || 2778),
    bgColor: cv.bgColor || '#ffffff',
    elements: Array.isArray(cv.elements) ? cv.elements : []
  }));
  const activeId = canvases.some(cv => cv.id === state.activeId) ? state.activeId : canvases[0].id;
  const elementIds = new Set(canvases.flatMap(cv => cv.elements.map(el => el.id)));
  return {
    canvases,
    activeId,
    mockupGap: Math.max(0, Math.min(600, Number(state.mockupGap) || 8)),
    zoom: Math.max(0.04, Math.min(5, Number(state.zoom) || 1)),
    selIds: Array.isArray(state.selIds) ? state.selIds.filter(id => elementIds.has(id)) : [],
    workspaceScroll: state.workspaceScroll || { left: 0, top: 0 }
  };
}

function rebuildIdSequences() {
  _cvSeq = Math.max(0, ...S.canvases.map(cv => numericIdSuffix(cv.id, 'c')));
  _elSeq = Math.max(0, ...S.canvases.flatMap(cv => cv.elements.map(el => numericIdSuffix(el.id, 'e'))));
}

function numericIdSuffix(id, prefix) {
  const match = String(id || '').match(new RegExp('^' + prefix + '(\\d+)$'));
  return match ? Number(match[1]) : 0;
}

function restoreWorkspaceScroll(scroll) {
  const ws = document.getElementById('workspace');
  if (!ws || !scroll) return;
  ws.scrollLeft = Math.max(0, Number(scroll.left) || 0);
  ws.scrollTop = Math.max(0, Number(scroll.top) || 0);
}

function syncZoomInput() {
  const input = document.getElementById('zoom-val');
  if (input) input.value = Math.round(S.zoom * 100) + '%';
}

// ═══════════════════════════════════════════════════════════
// EXPORT
// ═══════════════════════════════════════════════════════════
async function exportPNG() {
  const canvases = [...S.canvases];
  if (!canvases.length) return;

  setExportBusy(true);
  showExportStatus('Preparing export...');
  await nextFrame();
  try {
    if (canvases.length === 1) {
      showExportStatus('Exporting image...');
      const canvas = await renderCanvasForExport(canvases[0]);
      showExportStatus('Downloading image...');
      download(canvas, exportFileName(canvases[0], 0));
      return;
    }

    const files = [];
    for (let i = 0; i < canvases.length; i++) {
      showExportStatus(`Exporting ${i + 1} of ${canvases.length}...`);
      const canvas = await renderCanvasForExport(canvases[i]);
      files.push({
        name: exportFileName(canvases[i], i) + '.png',
        blob: await canvasToPngBlob(canvas)
      });
      await delay(180);
    }
    showExportStatus('Packaging ZIP...');
    downloadBlob(await createZipBlob(files), exportArchiveName());
  } catch (error) {
    console.error(error);
    showExportStatus('Export failed. Please try again.');
    await delay(1200);
  } finally {
    setExportBusy(false);
    hideExportStatus();
  }
}

function setExportBusy(isBusy) {
  const btn = document.getElementById('btn-export');
  if (!btn) return;
  btn.disabled = isBusy;
  btn.setAttribute('aria-busy', isBusy ? 'true' : 'false');
}

function showExportStatus(message) {
  const status = document.getElementById('export-status');
  const text = document.getElementById('export-status-text');
  if (!status || !text) return;
  text.textContent = message;
  status.classList.remove('hidden');
}

function hideExportStatus() {
  const status = document.getElementById('export-status');
  if (status) status.classList.add('hidden');
}

function nextFrame() {
  return new Promise(resolve => requestAnimationFrame(() => resolve()));
}

async function renderCanvasForExport(cv) {
  if (typeof html2canvas !== 'undefined') {
    const container = createExportContainer(cv);
    document.body.appendChild(container);
    await waitForImages(container);
    try {
      return await html2canvas(container, {
        width: cv.width,
        height: cv.height,
        scale: 1,
        useCORS: true,
        allowTaint: true,
        backgroundColor: cv.bgColor || '#ffffff',
        scrollX: 0,
        scrollY: 0,
        windowWidth: cv.width,
        windowHeight: cv.height
      });
    } finally {
      container.remove();
    }
  }

  const ec = document.createElement('canvas');
  ec.width = cv.width; ec.height = cv.height;
  const ctx = ec.getContext('2d');
  ctx.fillStyle = cv.bgColor || '#fff'; ctx.fillRect(0, 0, cv.width, cv.height);
  [...cv.elements].sort((a,b)=>a.zIndex-b.zIndex).forEach(el => drawElCtx(ctx, el, 1));
  return ec;
}

function createExportContainer(cv) {
  const container = document.createElement('div');
  container.className = 'export-canvas';
  container.style.position = 'fixed';
  container.style.left = '-100000px';
  container.style.top = '0';
  container.style.width = cv.width + 'px';
  container.style.height = cv.height + 'px';
  container.style.background = cv.bgColor || '#ffffff';
  container.style.overflow = 'hidden';
  container.style.boxShadow = 'none';
  container.style.transform = 'none';
  container.style.pointerEvents = 'none';
  container.style.contain = 'layout style paint';
  container.style.zIndex = '-1';
  container.dataset.canvasId = `export-${cv.id}`;
  renderElementsForCanvas(cv, container, `export-${cv.id}`, { interactive: false, uiZoom: 1 });
  renderOverflowForCanvas(cv, container, `export-overflow-${cv.id}`, { uiZoom: 1 });
  return container;
}

function waitForImages(root) {
  const images = [...root.querySelectorAll('img')].filter(img => img.src);
  return Promise.all(images.map(img => {
    if (img.complete) return Promise.resolve();
    if (img.decode) return img.decode().catch(() => {});
    return new Promise(resolve => {
      img.onload = resolve;
      img.onerror = resolve;
    });
  }));
}

function delay(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

function exportFileName(cv, index) {
  const order = String(index + 1).padStart(2, '0');
  const name = (cv.name || 'Canvas').trim().replace(/[\\/:*?"<>|]+/g, '-').replace(/\s+/g, ' ') || 'Canvas';
  return `${order}-${name}`;
}

function exportArchiveName() {
  return 'mockups.zip';
}

function download(canvas, name) {
  downloadBlob(canvas.toDataURL('image/png'), (name || 'canvas') + '.png');
}

function downloadBlob(blobOrUrl, name) {
  const a = document.createElement('a');
  const url = typeof blobOrUrl === 'string' ? blobOrUrl : URL.createObjectURL(blobOrUrl);
  a.download = name || 'download';
  a.href = url;
  document.body.appendChild(a);
  a.click();
  a.remove();
  if (typeof blobOrUrl !== 'string') setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function canvasToPngBlob(canvas) {
  return new Promise(resolve => {
    canvas.toBlob(blob => resolve(blob), 'image/png');
  });
}

async function createZipBlob(files) {
  const encoder = new TextEncoder();
  const localParts = [];
  const centralParts = [];
  let offset = 0;

  for (const file of files) {
    const nameBytes = encoder.encode(file.name);
    const data = new Uint8Array(await file.blob.arrayBuffer());
    const crc = crc32(data);
    const localHeader = zipLocalHeader(nameBytes, data.length, crc);
    localParts.push(localHeader, data);
    centralParts.push(zipCentralHeader(nameBytes, data.length, crc, offset));
    offset += localHeader.length + data.length;
  }

  const centralSize = centralParts.reduce((sum, part) => sum + part.length, 0);
  const end = zipEndRecord(files.length, centralSize, offset);
  return new Blob([...localParts, ...centralParts, end], { type: 'application/zip' });
}

function zipLocalHeader(nameBytes, size, crc) {
  const header = new Uint8Array(30 + nameBytes.length);
  const view = new DataView(header.buffer);
  view.setUint32(0, 0x04034b50, true);
  view.setUint16(4, 20, true);
  view.setUint16(8, 0, true);
  view.setUint32(14, crc, true);
  view.setUint32(18, size, true);
  view.setUint32(22, size, true);
  view.setUint16(26, nameBytes.length, true);
  header.set(nameBytes, 30);
  return header;
}

function zipCentralHeader(nameBytes, size, crc, offset) {
  const header = new Uint8Array(46 + nameBytes.length);
  const view = new DataView(header.buffer);
  view.setUint32(0, 0x02014b50, true);
  view.setUint16(4, 20, true);
  view.setUint16(6, 20, true);
  view.setUint16(10, 0, true);
  view.setUint32(16, crc, true);
  view.setUint32(20, size, true);
  view.setUint32(24, size, true);
  view.setUint16(28, nameBytes.length, true);
  view.setUint32(42, offset, true);
  header.set(nameBytes, 46);
  return header;
}

function zipEndRecord(fileCount, centralSize, centralOffset) {
  const header = new Uint8Array(22);
  const view = new DataView(header.buffer);
  view.setUint32(0, 0x06054b50, true);
  view.setUint16(8, fileCount, true);
  view.setUint16(10, fileCount, true);
  view.setUint32(12, centralSize, true);
  view.setUint32(16, centralOffset, true);
  return header;
}

function crc32(bytes) {
  let crc = 0xffffffff;
  for (const byte of bytes) {
    crc = CRC32_TABLE[(crc ^ byte) & 0xff] ^ (crc >>> 8);
  }
  return (crc ^ 0xffffffff) >>> 0;
}

const CRC32_TABLE = (() => {
  const table = new Uint32Array(256);
  for (let i = 0; i < 256; i++) {
    let c = i;
    for (let k = 0; k < 8; k++) {
      c = c & 1 ? 0xedb88320 ^ (c >>> 1) : c >>> 1;
    }
    table[i] = c >>> 0;
  }
  return table;
})();

// ─ Canvas 2D drawing (used in thumbnails + fallback export) ─
function drawElCtx(ctx, el, sc) {
  ctx.save();
  ctx.globalAlpha = el.opacity;
  const ex=el.x*sc, ey=el.y*sc, ew=el.width*sc, eh=el.height*sc;
  ctx.translate(ex+ew/2, ey+eh/2);
  if (el.rotation) ctx.rotate(el.rotation*Math.PI/180);
  if (el.flipH||el.flipV) ctx.scale(el.flipH?-1:1,el.flipV?-1:1);
  ctx.translate(-ew/2,-eh/2);

  switch(el.type) {
    case 'rect':
      ctx.fillStyle = rgba(el.fillColor,el.fillAlpha);
      ctx.beginPath(); ctxRR(ctx,0,0,ew,eh,(el.borderRadius||0)*sc); ctx.fill();
      if(el.borderWidth>0){ctx.strokeStyle=el.borderColor;ctx.lineWidth=el.borderWidth*sc;ctx.stroke();}
      break;
    case 'circle':
      ctx.fillStyle=rgba(el.fillColor,el.fillAlpha);
      ctx.beginPath();ctx.ellipse(ew/2,eh/2,ew/2,eh/2,0,0,Math.PI*2);ctx.fill();
      if(el.borderWidth>0){ctx.strokeStyle=el.borderColor;ctx.lineWidth=el.borderWidth*sc;ctx.stroke();}
      break;
    case 'triangle':
      ctx.fillStyle=rgba(el.fillColor,el.fillAlpha);
      ctx.beginPath();ctx.moveTo(ew/2,0);ctx.lineTo(ew,eh);ctx.lineTo(0,eh);ctx.closePath();ctx.fill();
      if(el.borderWidth>0){ctx.strokeStyle=el.borderColor;ctx.lineWidth=el.borderWidth*sc;ctx.stroke();}
      break;
    case 'line': case 'arrow':
      ctx.strokeStyle=el.strokeColor||'#333';ctx.lineWidth=(el.strokeWidth||2)*sc;
      if(el.lineStyle==='dashed')ctx.setLineDash([10*sc,6*sc]);
      else if(el.lineStyle==='dotted')ctx.setLineDash([2*sc,5*sc]);
      ctx.beginPath();ctx.moveTo(0,eh/2);ctx.lineTo(ew,eh/2);ctx.stroke();ctx.setLineDash([]);
      break;
    case 'text':
      if(el.fillAlpha>0){ctx.fillStyle=rgba(el.fillColor,el.fillAlpha);ctx.fillRect(0,0,ew,eh);}
      ctx.fillStyle=el.textColor||'#000';
      ctx.font=`${el.fontStyle||''} ${el.fontWeight||'normal'} ${(el.fontSize||16)*sc}px ${el.fontFamily||'sans-serif'}`;
      ctx.textBaseline='top';
      (el.text||'').split('\n').forEach((line,i)=>ctx.fillText(line,4*sc,(4+i*(el.fontSize||16)*1.3)*sc));
      break;
    case 'image':
      if(el.src){const img=new Image();img.src=el.src;try{ctx.drawImage(img,0,0,ew,eh);}catch(e){}}
      else{ctx.fillStyle='#ccc';ctx.fillRect(0,0,ew,eh);}
      break;
    case 'frame':
      drawFrameCtx(ctx, el, ew, eh);
      break;
  }
  ctx.restore();
}

function frameScreenMetrics(device, w, h) {
  if (device === 'android') {
    return { x: w * 0.026, y: h * 0.017, w: w * 0.948, h: h * 0.966, r: Math.min(w * 0.07, h * 0.035) };
  }
  return { x: w * 0.022, y: h * 0.012, w: w * 0.956, h: h * 0.976, r: Math.min(w * 0.11, h * 0.051) };
}

function drawFrameCtx(ctx, el, w, h) {
  const device = el.device === 'android' ? 'android' : 'ios';
  const border = Math.max(8, Math.min(w, h) * 0.028);
  const radius = device === 'android' ? Math.min(w * 0.09, h * 0.045) : Math.min(w * 0.13, h * 0.06);

  ctx.fillStyle = FRAME_COLOR;
  ctx.beginPath(); ctxRR(ctx, 0, 0, w, h, radius); ctx.fill();
  ctx.strokeStyle = FRAME_COLOR;
  ctx.lineWidth = Math.max(1, border * 0.16);
  ctx.stroke();

  const screen = frameScreenMetrics(device, w, h);
  ctx.save();
  ctx.beginPath(); ctxRR(ctx, screen.x, screen.y, screen.w, screen.h, screen.r); ctx.clip();
  ctx.fillStyle = el.src ? '#fff' : '#f7fbff';
  ctx.fillRect(screen.x, screen.y, screen.w, screen.h);
  if (el.src) {
    const img = new Image();
    img.src = el.src;
    try {
      drawObjectFitImageCtx(ctx, img, screen.x, screen.y, screen.w, screen.h, el.fitMode || 'fill');
    } catch (e) {}
  } else {
    ctx.strokeStyle = 'rgba(77,157,224,.85)';
    ctx.lineWidth = Math.max(1, Math.min(w, h) * 0.008);
    ctx.setLineDash([12, 8]);
    ctx.strokeRect(screen.x + screen.w * 0.16, screen.y + screen.h * 0.42, screen.w * 0.68, screen.h * 0.16);
    ctx.setLineDash([]);
  }
  ctx.restore();

  ctx.fillStyle = '#050505';
  if (device === 'android') {
    ctx.beginPath();
    ctx.arc(w * 0.5, h * 0.039 + w * 0.0225, w * 0.0225, 0, Math.PI * 2);
    ctx.fill();
  } else {
    const iw = w * 0.298, ih = h * 0.041;
    ctx.beginPath(); ctxRR(ctx, w * 0.351, h * 0.028, iw, ih, ih / 2); ctx.fill();
  }
}

function drawObjectFitImageCtx(ctx, img, x, y, w, h, fitMode) {
  const iw = img.naturalWidth || img.width || w;
  const ih = img.naturalHeight || img.height || h;
  if (fitMode === 'stretch') {
    ctx.drawImage(img, x, y, w, h);
    return;
  }
  const scale = fitMode === 'fit' ? Math.min(w / iw, h / ih) : Math.max(w / iw, h / ih);
  const dw = iw * scale;
  const dh = ih * scale;
  ctx.drawImage(img, x + (w - dw) / 2, y + (h - dh) / 2, dw, dh);
}

function ctxRR(ctx, x, y, w, h, r) {
  r = Math.min(r, w/2, h/2);
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

// ═══════════════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════════════
function rgba(hex, alpha) {
  if (!hex || hex === 'transparent') return 'transparent';
  hex = hex.replace('#','');
  if (hex.length===3) hex=hex.split('').map(c=>c+c).join('');
  const r=parseInt(hex.substr(0,2),16), g=parseInt(hex.substr(2,2),16), b=parseInt(hex.substr(4,2),16);
  return `rgba(${r},${g},${b},${alpha??1})`;
}
function toHex6(h) {
  if (!h) return '#000000';
  h = h.replace('#','');
  if (h.length===3) h=h.split('').map(c=>c+c).join('');
  return '#'+h.slice(0,6).padEnd(6,'0');
}

// ═══════════════════════════════════════════════════════════
// START
// ═══════════════════════════════════════════════════════════
init();
